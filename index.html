    { q: 'Lukas Maler streitet über seine Unfallrente nach einem Arbeitsunfall. Welches Gericht ist zuständig?', opts: ['Sozialgericht', 'Arbeitsgericht', 'Amtsgericht', 'Unfallgericht'], a: 0, explain: 'Streitigkeiten über Leistungen der gesetzlichen Sozialversicherung (Unfallrente, Krankengeld, Arbeitslosengeld) werden vor dem Sozialgericht verhandelt.' },
    { q: 'Okan Yilmaz hält seine Kündigung für sozial ungerechtfertigt. Welches Gericht ist zuständig?', opts: ['Arbeitsgericht', 'Sozialgericht', 'Amtsgericht', 'Landgericht'], a: 0, explain: 'Das Arbeitsgericht ist zuständig für Streitigkeiten aus Arbeitsverhältnissen: Kündigungsschutz, Lohn, Abmahnung, Zeugnis etc.' },
    { q: 'Welche Aussagen zur Arbeitsgerichtsbarkeit sind richtig?', opts: ['Zuständig ist der Gerichtssitz am Firmensitz der beklagten Partei; in 1. Instanz kein Anwaltszwang', 'Zuständig ist der Gerichtssitz am Wohnort des Klägers', 'In allen Instanzen besteht Anwaltszwang', 'Nur AG-Städte haben Arbeitsgerichte'], a: 0, explain: 'Arbeitsgericht: örtliche Zuständigkeit = Firmensitz des Beklagten. In der 1. Instanz (Arbeitsgericht) gibt es keinen Anwaltszwang. Ab 2. Instanz (Landesarbeitsgericht) besteht Anwaltspflicht.' },
    { q: 'Wonach bestimmt sich die örtliche Zuständigkeit beim Sozialgericht?', opts: ['Wohnort des Klägers', 'Wohnort des Beklagten', 'Wohnort des zuständigen Richters', 'Firmensitz der beklagten Partei'], a: 0, explain: 'Bei Sozialgerichten richtet sich die örtliche Zuständigkeit nach dem Wohnort des Klägers (Versicherten) — nicht nach dem Sitz des Sozialversicherungsträgers.' },
    { q: 'Welche Aussagen zur Sozialgerichtsbarkeit sind richtig?', opts: ['Widerspruchsverfahren muss vor Klage ausgeschöpft werden; Berufs- und Ehrenamtliche Richter haben gleiches Stimmrecht', 'Klage muss durch Anwalt erhoben werden', 'Nur Berufsrichter haben Stimmrecht', 'Keine Kostenpflicht für den Beklagten'], a: 0, explain: 'Sozialgericht: Vor Klageerhebung muss das Widerspruchsverfahren ausgeschöpft werden. Entscheidungen treffen Berufsrichter und ehrenamtliche Richter gemeinsam mit gleichem Stimmrecht.' },
    { q: 'Petra Puk verliert einen Prozess vor dem Sozialgericht. Was gilt für die Verfahrenskosten?', opts: ['Verfahren vor Sozialgericht sind für rechtsuchende Bürger überwiegend kostenfrei', 'Der Beklagte trägt alle Kosten', 'Petra Puk trägt alle Kosten', 'Kosten werden nach Einkommen berechnet'], a: 0, explain: 'Im Sozialgerichtsverfahren gilt: Verfahren sind für die Versicherten (rechtsuchende Bürger) grundsätzlich kostenfrei. Kein Kostenrisiko wie in der Zivilgerichtsbarkeit.' },
    { q: 'Innerhalb welcher Frist ist nach Zugang einer Kündigung eine Kündigungsschutzklage einzureichen?', opts: ['3 Wochen', '2 Wochen', '4 Wochen', '6 Wochen'], a: 0, explain: 'Die Kündigungsschutzklage muss innerhalb von 3 Wochen nach Zugang der Kündigung beim Arbeitsgericht eingereicht werden (§4 KSchG). Danach gilt die Kündigung als wirksam.' },
    { q: 'Wer führt das Schiedsverfahren bei Streitigkeiten zwischen Azubi und Ausbildungsbetrieb durch?', opts: ['Industrie- und Handelskammer (IHK)', 'Arbeitsgericht', 'Sozialgericht', 'Berufsschule'], a: 0, explain: 'Bei Streitigkeiten aus Berufsausbildungsverhältnissen ist zunächst eine Schlichtung durch die zuständige Stelle (IHK/HWK) vorgeschrieben, bevor das Arbeitsgericht angerufen werden kann.' },
    { q: 'Welche Aussagen zur Güteverhandlung beim Arbeitsgericht sind richtig?', opts: ['Vor der Verhandlung soll eine Einigung erreicht werden; Kläger kann auf Güteverhandlung verzichten', 'Verfahren soll beschleunigt werden', 'Güteverhandlung findet unter Ausschluss der Öffentlichkeit statt', 'Güteverhandlung ist nicht möglich'], a: 0, explain: 'Die Güteverhandlung ist zwingender erster Schritt im Arbeitsgerichtsverfahren. Ziel: gütliche Einigung vor der streitigen Verhandlung. Der Kläger kann auf die Güteverhandlung verzichten (§54 ArbGG).' },
    { q: 'Welche Voraussetzungen gelten für eine Berufung gegen ein Urteil des Arbeitsgerichts?', opts: ['Streitwert über 600€ oder Berufung muss vom Arbeitsgericht zugelassen sein', 'Urteil darf nicht einstimmig gefällt worden sein', 'Anwalt muss sofort Berufung einlegen', 'Keine besonderen Voraussetzungen'], a: 0, explain: 'Berufung gegen Arbeitsgerichtsurteil: möglich wenn Streitwert > 600€ oder das Arbeitsgericht die Berufung wegen grundsätzlicher Bedeutung zugelassen hat (§64 ArbGG).' },
  ],
  staat_wirtschaft: [
    { q: 'Wer ist das Staatsoberhaupt der Bundesrepublik Deutschland und wie wird es gewählt?', opts: ['Der Bundespräsident; er wird von der Bundesversammlung gewählt', 'Der Bundespräsident; er wird vom Volk direkt gewählt', 'Der Bundeskanzler; er wird vom Bundestag gewählt', 'Der Bundeskanzler; er wird von den Bundesministern gewählt'], a: 0, explain: 'Der Bundespräsident ist das Staatsoberhaupt der BRD. Er wird von der Bundesversammlung (Bundestags-MdBs + gleiche Anzahl Ländervertreter) für 5 Jahre gewählt.' },
    { q: 'In welchem Abstand finden Bundestagswahlen statt?', opts: ['Alle 4 Jahre', 'Alle 2 Jahre', 'Alle 3 Jahre', 'Alle 5 Jahre'], a: 0, explain: 'Bundestagswahlen finden alle 4 Jahre statt (Art. 39 GG). Der Deutsche Bundestag hat eine reguläre Legislaturperiode von 4 Jahren.' },
    { q: 'Wie wird die Wirtschaftsordnung in Deutschland genannt?', opts: ['Soziale Marktwirtschaft', 'Planwirtschaft', 'Kapitalismus', 'Zentralverwaltungswirtschaft'], a: 0, explain: 'Deutschland hat eine Soziale Marktwirtschaft: Kombination aus freiem Markt (Wettbewerb, Preisfreiheit) mit sozialer Absicherung (Sozialversicherungen, Arbeitsrecht). Konzept: Müller-Armack/Erhard.' },
    { q: 'Wer wählt den Bundeskanzler?', opts: ['Der Bundestag', 'Der Bundesrat', 'Die Bundesversammlung', 'Das Volk'], a: 0, explain: 'Der Bundeskanzler wird vom Bundestag auf Vorschlag des Bundespräsidenten gewählt (Art. 63 GG). Er leitet die Bundesregierung und bestimmt die Richtlinien der Politik.' },
    { q: 'In welchem Jahr trat das Grundgesetz in Kraft?', opts: ['1949', '1945', '1939', '1955'], a: 0, explain: 'Das Grundgesetz der Bundesrepublik Deutschland trat am 23. Mai 1949 in Kraft. Es ist die Verfassung Deutschlands und enthält die Grundrechte sowie die Staatsorganisation.' },
    { q: 'Wie heißt das Verfassungsorgan, durch das Bundesländer bei der Gesetzgebung mitwirken?', opts: ['Bundesrat', 'Kreistag', 'Bundestag', 'Europaparlament'], a: 0, explain: 'Der Bundesrat ist die Vertretung der 16 Bundesländer auf Bundesebene. Er wirkt bei der Bundesgesetzgebung mit und kann Gesetze zustimmen oder ablehnen.' },
    { q: 'Welches Ziel gehört NICHT zum "magischen Viereck"?', opts: ['Zufriedene Bürger und Bürgerinnen', 'Angemessenes und stetiges Wirtschaftswachstum', 'Preisstabilität', 'Außenwirtschaftliches Gleichgewicht'], a: 0, explain: 'Das Magische Viereck (StWG 1967) umfasst: 1) Preisstabilität, 2) Hoher Beschäftigungsstand, 3) Stetiges Wirtschaftswachstum, 4) Außenwirtschaftliches Gleichgewicht. "Zufriedene Bürger" ist kein offizielles Ziel.' },
    { q: 'Was ist das Maximalprinzip im Wirtschaftsbereich?', opts: ['Mit vorgegebenen Mitteln soll ein Maximum an Ertrag erzielt werden', 'Ein vorgegebenes Ziel mit Minimum an Kosten erreichen', 'Ein vorgegebenes Ziel mit Maximum an Kosten erreichen', 'Mit vorgegebenen Mitteln ein Minimum an Ertrag erzielen'], a: 0, explain: 'Maximalprinzip: Mit gegebenem Mitteleinsatz das bestmögliche Ergebnis erzielen. Minimalprinzip: Ein bestimmtes Ziel mit minimalem Aufwand erreichen. Beide sind Ausprägungen des ökonomischen Prinzips.' },
    { q: 'Wie wird der höchste Punkt eines Konjunkturverlaufes genannt?', opts: ['Boom (Hochkonjunktur)', 'Expansion', 'Rezession', 'Depression'], a: 0, explain: 'Der Konjunkturzyklus: Expansion (Aufschwung) → Boom/Hochkonjunktur (Höhepunkt) → Rezession (Abschwung) → Depression (Tiefpunkt). Beim Boom: höchste Beschäftigung, BIP auf Maximum.' },
    { q: 'Welches Land gehört NICHT zur EU?', opts: ['Türkei', 'Belgien', 'Polen', 'Schweden'], a: 0, explain: 'Die Türkei ist kein EU-Mitglied (Stand 2024), obwohl Beitrittsverhandlungen laufen. Belgien, Polen und Schweden sind EU-Mitglieder.' },
    { q: 'Welcher Wert gibt den Gesamtwert aller Güter und Dienstleistungen an, die innerhalb eines Jahres innerhalb der Landesgrenzen produziert wurden?', opts: ['Bruttoinlandsprodukt (BIP)', 'Bruttonationaleinkommen', 'Nettoinlandsprodukt', 'Volkseinkommen'], a: 0, explain: 'Das BIP (Bruttoinlandsprodukt) misst den Gesamtwert aller Waren und Dienstleistungen, die im Inland in einem Jahr produziert werden — unabhängig von der Nationalität der Produzenten.' },
    { q: 'Welche Behörde kann Unternehmenszusammenschlüsse verbieten und Geldbußen verhängen?', opts: ['Bundeskartellamt', 'Wirtschaftsministerium', 'Verbraucherministerium', 'Industrie- und Handelskammer'], a: 0, explain: 'Das Bundeskartellamt überwacht den Wettbewerb in Deutschland: Es kann Fusionen untersagen, Kartelle aufdecken, missbräuchliches Verhalten untersagen und Bußgelder verhängen.' },
    { q: 'Welche Maßnahme ist geeignet, um in einer Abschwungphase die Nachfrage zu steigern?', opts: ['Senkung der BaföG-Sätze und Erhöhung des Kindergeldes', 'Erhöhung der Kraftfahrzeugsteuer', 'Einführung einer neuen Sondersteuer', 'Erhöhung der Kraftfahrzeugsteuer und neue Sondersteuer'], a: 0, explain: 'In der Rezession soll der Staat die Nachfrage ankurbeln (expansive Fiskalpolitik): Kindergeld erhöhen (mehr Kaufkraft), BaföG senken belastet Verbraucher — daher: Kindergeld-Erhöhung ist geeignet, BaföG-Senkung nicht.' },
    { q: 'Was sind richtige Aussagen zur Marktwirtschaft?', opts: ['Preis wird durch Angebot und Nachfrage festgelegt; hohe Nachfrage kann zu Preissteigerungen führen', 'Angebot wird vom Wahlsieger festgelegt', 'Preis durch 5-Jahres-Plan festgelegt', 'Staat bestimmt alle Preise'], a: 0, explain: 'In der Marktwirtschaft: Preise entstehen durch Angebot und Nachfrage (unsichtbare Hand). Hohe Nachfrage bei begrenztem Angebot → Preisstieg. Planung durch staatliche Stellen = Planwirtschaft.' },
    { q: 'Was ist das Minimalprinzip?', opts: ['Ein Malermeister vergleicht Preise und kauft beim günstigsten Anbieter', 'Für einen bestimmten Betrag so viel Farbe wie möglich kaufen', 'Mindestens 5 Angebote einholen', 'Möglichst viel Farbe für möglichst wenig Geld'], a: 0, explain: 'Minimalprinzip: Ein bestimmtes Ziel (bestimmte Farbmenge) mit minimalem Aufwand (geringstem Preis) erreichen. Der Malermeister, der den günstigsten Anbieter sucht, handelt nach dem Minimalprinzip.' },
  ],
  weiterbildung: [
    { q: 'Wo erhält man Informationen über eine mögliche Förderung einer Weiterbildung?', opts: ['Arbeitsberatung der Arbeitsagenturen', 'Gewerbeamt', 'Bürgerbüro', 'Direkt beim Anbieter der Maßnahme'], a: 0, explain: 'Informationen zur Weiterbildungsförderung gibt es bei der Arbeitsagentur (Beratung + Förderung durch z.B. Bildungsgutschein) und direkt beim Anbieter der Maßnahme.' },
    { q: 'Was kennzeichnet eine Maßnahme der beruflichen Fortbildung?', opts: ['Sie baut auf einer Qualifikation auf, die in einem Ausbildungsberuf erworben wurde', 'Sie führt immer zu einer anderen beruflichen Tätigkeit', 'Sie ist immer mit einer Gehaltserhöhung verbunden', 'Qualifikationen werden nie durch Prüfungen nachgewiesen'], a: 0, explain: 'Berufliche Fortbildung baut auf vorhandenen Qualifikationen auf (z.B. Meister, Fachwirt) und wird meist durch Prüfungen nachgewiesen — im Gegensatz zur Umschulung.' },
    { q: 'Warum wird Weiterbildung im Beruf für Arbeitnehmer immer wichtiger?', opts: ['Berufliches Wissen muss erhalten und ausgebaut werden', 'Durch Arbeitszeitverkürzung bleibt weniger Zeit für Aufgaben', 'Weiterbildung erhöht den Urlaubsanspruch', 'Weiterbildung ist gesetzlich für alle verpflichtend'], a: 0, explain: 'Weiterbildung ist wichtig, weil Kenntnisse der schnellen technischen Entwicklung angepasst werden müssen und berufliches Wissen erhalten und ausgebaut werden sollte.' },
    { q: 'Was ist der Unterschied zwischen Fortbildung und Umschulung?', opts: ['Fortbildung vertieft/erweitert den erlernten Beruf; Umschulung führt zu einem anderen Beruf', 'Beides ist identisch', 'Umschulung ist nur für Jugendliche', 'Fortbildung ist staatlich finanziert; Umschulung privat'], a: 0, explain: 'Fortbildung (z.B. Meisterprüfung) baut auf dem erlernten Beruf auf. Umschulung führt zu einem vollständig anderen Beruf — z.B. wenn der alte Beruf gesundheitlich nicht mehr ausgeübt werden kann.' },
    { q: 'Ein Elektriker macht den Meister. Was ist das?', opts: ['Berufliche Fortbildung', 'Umschulung', 'Erstausbildung', 'Studium'], a: 0, explain: 'Der Meister ist eine berufliche Fortbildung: Er baut auf der abgeschlossenen Berufsausbildung auf und erweitert die Qualifikation innerhalb desselben Berufsfeldes.' },
    { q: 'Ein Bäcker muss wegen einer Mehlallergie umschulen. Was trifft zu?', opts: ['Er macht eine Umschulung zu einem anderen Beruf', 'Er macht eine Fortbildung', 'Er macht eine Weiterbildung im Bäckerhandwerk', 'Er macht ein Studium'], a: 0, explain: 'Da der Bäcker seinen Beruf gesundheitlich nicht mehr ausüben kann, wechselt er in einen anderen Beruf — das ist eine Umschulung.' },
    { q: 'Was ist ein Bildungsgutschein?', opts: ['Staatliche Förderung der Arbeitsagentur für anerkannte Weiterbildungsmaßnahmen', 'Gutschein für Schulbücher', 'Rabatt auf Berufsschulgebühren', 'Steuererstattung für Weiterbildungskosten'], a: 0, explain: 'Der Bildungsgutschein wird von der Arbeitsagentur oder dem Jobcenter ausgestellt und berechtigt zum kostenlosen Besuch einer anerkannten Weiterbildungsmaßnahme.' },
    { q: 'Was versteht man unter "lebenslangem Lernen"?', opts: ['Kontinuierliche Weiterbildung über das gesamte Berufsleben hinaus', 'Pflichtschulzeit bis 18 Jahre', 'Nur formale Ausbildungen und Studiengänge', 'Lernen nur im Betrieb'], a: 0, explain: 'Lebenslanges Lernen bedeutet, dass Menschen über die gesamte Lebensspanne hinaus lernen — formell (Ausbildung, Studium) und informell (Berufserfahrung, Selbststudium).' },
    { q: 'Eine Industriekauffrau legt die Ausbildereignungsprüfung ab. Was ist das?', opts: ['Berufliche Fortbildung', 'Umschulung', 'Erstausbildung', 'Berufsvorbereitung'], a: 0, explain: 'Die Ausbildereignungsprüfung (AEVO) ist eine berufliche Fortbildung — sie baut auf dem erlernten Beruf auf und erweitert die Qualifikation um die Fähigkeit, selbst auszubilden.' },
    { q: 'Welche Stelle fördert Umschulungen für Arbeitslose?', opts: ['Bundesagentur für Arbeit (Arbeitsagentur)', 'IHK', 'Finanzamt', 'Rentenversicherung'], a: 0, explain: 'Die Bundesagentur für Arbeit fördert Umschulungen für Arbeitslose z.B. durch Bildungsgutscheine, Umschulungsbeihilfen und Beratungsangebote.' },
    { q: 'Wer ist für die Überwachung von Umschulungsmaßnahmen nach dem BBiG zuständig?', opts: ['Industrie- und Handelskammer / Handwerkskammer', 'Arbeitsagentur', 'Berufsschule', 'Deutsches Institut für Erwachsenenbildung'], a: 0, explain: 'Die IHK bzw. HWK ist als zuständige Stelle nach BBiG für die Überwachung von Umschulungsmaßnahmen verantwortlich — nicht die Arbeitsagentur.' },
    { q: 'In welchem Gesetz ist die finanzielle Förderung beruflicher Fortbildung geregelt?', opts: ['Sozialgesetzbuch (SGB 3)', 'Berufsbildungsgesetz (BBiG)', 'Bürgerliches Gesetzbuch (BGB)', 'Handelsgesetzbuch (HGB)'], a: 0, explain: 'Die finanzielle Förderung beruflicher Weiterbildung (z.B. Meister-BAföG, Aufstiegsstipendien) ist im SGB III geregelt, das die Arbeitsförderung regelt.' },
    { q: 'Was sind Besonderheiten dualer Studiengänge?', opts: ['Hoher Praxisbezug und Verbindung von Hochschule/Akademie mit Betrieb', 'Zwei Studiengänge gleichzeitig belegen', 'Nur sehr wenige werden übernommen', 'Kein Unterschied zum normalen Studium'], a: 0, explain: 'Duale Studiengänge verbinden Theorie (Hochschule/Berufsakademie) mit Praxis (Betrieb) — hoher Praxisbezug, vergütete Ausbildung und gute Übernahmechancen sind typische Merkmale.' },
    { q: 'Welche Anforderungen werden an einen Ausbilder gestellt?', opts: ['Fachliche Kompetenz, Erfahrung mit jungen Menschen, gezielte Ausbildungsmethoden', 'Nur fachliche Kompetenz', 'Mitglied im Prüfungsausschuss sein', 'Mindestens 10 Jahre Berufserfahrung'], a: 0, explain: 'Ein Ausbilder muss: fachlich kompetent sein, Erfahrung im Umgang mit jungen Menschen haben, gezielt Ausbildungsmethoden einsetzen können und persönlich geeignet sein (AEVO).' },
    { q: 'Was versteht man unter beruflicher Flexibilität?', opts: ['Die Fähigkeit, sich neuen Anforderungen im Beruf zu stellen', 'Den Beruf im gleichen Betrieb häufiger zu wechseln', 'Bei Notwendigkeit den Wohnort zu wechseln', 'Den Arbeitgeber jederzeit zu wechseln'], a: 0, explain: 'Berufliche Flexibilität bedeutet die Fähigkeit und Bereitschaft, sich verändernden beruflichen Anforderungen anzupassen — z.B. neue Technologien erlernen oder Aufgabenbereiche wechseln.' },
    { q: 'Der Betriebsrat hat bei Berufsbildungsmaßnahmen welches Recht?', opts: ['Mitbestimmungsrecht', 'Anhörungsrecht', 'Informationsrecht', 'Keine Rechte da unternehmerische Entscheidung'], a: 0, explain: 'Bei Berufsbildungsmaßnahmen hat der Betriebsrat ein Mitbestimmungsrecht (§98 BetrVG) — z.B. bei der Auswahl der Teilnehmer und der Planung von Maßnahmen.' },
    { q: 'Was wäre bei einer Präsentation urheberrechtlich geschützt?', opts: ['Einbau einer Skizze aus einem Fachbuch', 'Nennung von Rechtsvorschriften', 'Einbau eines selbst hergestellten Videoclips', 'Bezug auf konkrete Fakten'], a: 0, explain: 'Eine Skizze aus einem Fachbuch ist urheberrechtlich geschützt — sie darf nicht ohne Genehmigung des Urhebers verwendet werden. Rechtsvorschriften, Fakten und eigene Werke sind frei nutzbar.' },
    { q: 'Welche Aussage zum Urheberrecht ist richtig?', opts: ['Der Urheber legt fest, wie mit seinen Werken umgegangen wird', 'Das Urheberrecht gilt nur eingeschränkt im Internet', 'Das Urheberrecht gilt nicht bei betrieblichen Fortbildungen', 'Das Urheberrecht verbietet die Nutzung auch mit Erlaubnis des Urhebers'], a: 0, explain: 'Der Urheber hat das alleinige Recht zu bestimmen, wie sein Werk genutzt, verbreitet oder verändert wird (UrhG). Das gilt auch im Internet und bei betrieblichen Veranstaltungen.' },
    { q: 'Eine Weiterbildung zur Einführung einer neuen E-Mail Software — welche Art der Fortbildung ist das?', opts: ['Anpassungsfortbildung', 'Gruppenfortbildung', 'Aufstiegsfortbildung', 'Erhaltungsfortbildung'], a: 0, explain: 'Eine Anpassungsfortbildung dient dazu, vorhandene Kenntnisse an neue technische Entwicklungen anzupassen (z.B. neue Software). Aufstiegsfortbildungen (z.B. Meister) führen zu höheren Qualifikationen.' },
    { q: 'Welchem Zweck dient die Datenschutzgrundverordnung (DSGVO)?', opts: ['Schutz vor Missbrauch personenbezogener Daten', 'Schutz vor Verlust gespeicherter Daten', 'Schutz vor Weitergabe innerbetrieblicher Kennzahlen', 'Schutz vor versehentlicher Löschung von Betriebsinterna'], a: 0, explain: 'Die DSGVO schützt natürliche Personen vor dem Missbrauch ihrer personenbezogenen Daten. Sie regelt Erhebung, Verarbeitung und Speicherung von Daten in der EU.' },
  ],
  vertragsrecht: [
    { q: 'Ab welchem Alter ist man in Deutschland voll geschäftsfähig?', opts: ['18 Jahre', '16 Jahre', '21 Jahre', '14 Jahre'], a: 0, explain: 'Volle Geschäftsfähigkeit ab 18 Jahren. Unter 7: geschäftsunfähig. 7–17: beschränkt geschäftsfähig.' },
    { q: 'Was ist ein Vertrag im rechtlichen Sinne?', opts: ['Übereinstimmende Willenserklärungen (Angebot + Annahme)', 'Schriftliches Dokument mit Stempel', 'Mündliche Abmachung ohne Rechtsfolgen', 'Staatlicher Verwaltungsakt'], a: 0, explain: 'Ein Vertrag kommt durch zwei übereinstimmende Willenserklärungen zustande: Angebot und Annahme.' },
    { q: 'Was sind die Hauptpflichten beim Kaufvertrag?', opts: ['Verkäufer: Übergabe + Übereignung; Käufer: Kaufpreis zahlen', 'Nur Zahlung des Kaufpreises', 'Nur Übergabe der Ware', 'Keine gesetzlichen Pflichten'], a: 0, explain: 'Beim Kaufvertrag (§433 BGB): Verkäufer übergibt und übereignet die mangelfreie Sache. Käufer zahlt den Kaufpreis und nimmt die Sache ab.' },
    { q: 'Was ist beschränkte Geschäftsfähigkeit?', opts: ['Minderjährige (7–17) brauchen für Verträge die Zustimmung der Eltern', 'Kein Recht auf Vertragsabschluss', 'Nur mündliche Verträge erlaubt', 'Gleiches wie volle Geschäftsfähigkeit'], a: 0, explain: 'Beschränkt Geschäftsfähige (7–17) benötigen für Verträge die Einwilligung des gesetzlichen Vertreters. Ausnahme: §110 BGB (Taschengeldparagraph).' },
    { q: 'Was besagt der Taschengeldparagraph (§110 BGB)?', opts: ['Minderjährige können Verträge wirksam schließen, wenn sie mit eigenem Geld bezahlen', 'Eltern haften für Schulden ihrer Kinder', 'Kinder dürfen kein Taschengeld ausgeben', 'Verträge mit Minderjährigen sind immer nichtig'], a: 0, explain: 'Nach §110 BGB ist ein Vertrag eines Minderjährigen wirksam, wenn er die Leistung mit Mitteln bewirkt, die ihm zur freien Verfügung überlassen wurden.' },
    { q: 'Was ist der Unterschied zwischen Nichtigkeit und Anfechtbarkeit?', opts: ['Nichtiger Vertrag ist von Anfang an unwirksam; anfechtbarer wird rückwirkend unwirksam', 'Kein Unterschied', 'Anfechtbarer Vertrag bleibt immer wirksam', 'Nichtiger Vertrag kann geheilt werden'], a: 0, explain: 'Nichtigkeit: Vertrag ist von Anfang an (ex tunc) unwirksam (z.B. Sittenwidrigkeit §138 BGB). Anfechtbarkeit: zunächst wirksam, nach Anfechtung rückwirkend nichtig.' },
    { q: 'Welche Vertragsarten gibt es im Alltag?', opts: ['Kaufvertrag, Mietvertrag, Dienstvertrag, Werkvertrag, Leihvertrag', 'Nur Kaufverträge', 'Nur schriftliche Verträge', 'Nur Verträge mit Unternehmen'], a: 0, explain: 'Häufige Vertragsarten: Kaufvertrag (§433), Mietvertrag (§535), Dienstvertrag (§611), Werkvertrag (§631), Leihvertrag (§598).' },
    { q: 'Was ist der Unterschied zwischen Dienstvertrag und Werkvertrag?', opts: ['Dienstvertrag: Tätigkeit wird geschuldet; Werkvertrag: Erfolg (Werk) wird geschuldet', 'Kein Unterschied', 'Werkvertrag ist nur für Handwerker', 'Dienstvertrag nur für Angestellte'], a: 0, explain: 'Beim Dienstvertrag wird die Dienstleistung selbst geschuldet (z.B. Arzt, Anwalt). Beim Werkvertrag wird ein bestimmter Erfolg geschuldet (z.B. Reparatur, Hausbau).' },

const LEVEL_THRESHOLDS = [0, 100, 250, 500, 800, 1200, 1700, 2500];
const LEVEL_NAMES = ['Novice', 'Lehrling', 'Praktikant', 'Junior', 'Geselle', 'Senior', 'Expert', 'Master'];

function getLevelInfo(xp) {
  let level = 0;
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (xp >= LEVEL_THRESHOLDS[i]) level = i; else break;
  }
  const current = LEVEL_THRESHOLDS[level] || 0;
  const next = LEVEL_THRESHOLDS[level + 1] || LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length - 1];
  const progress = next > current ? (xp - current) / (next - current) : 1;
  return { level, name: LEVEL_NAMES[level], progress };
}

function App() {
  const [screen, setScreen] = useState('home');
  const [activeTopic, setActiveTopic] = useState(null);
  const [quizQ, setQuizQ] = useState(0);
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [selected, setSelected] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [answers, setAnswers] = useState([]);
  const [xp, setXp] = useState(() => parseInt(localStorage.getItem('wiso_xp') || '0'));
  const [topicProgress, setTopicProgress] = useState(() => {
    try { return JSON.parse(localStorage.getItem('wiso_progress') || '{}'); } catch { return {}; }
  });
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [xpGain, setXpGain] = useState(null);
  const [quizCount, setQuizCount] = useState(5);
  // selectedQuestions: { topicId: Set<index> } — empty set = all selected
  const [selectedQuestions, setSelectedQuestions] = useState({});
  const [expandedTopic, setExpandedTopic] = useState(null);

  useEffect(() => { localStorage.setItem('wiso_xp', xp); }, [xp]);
  useEffect(() => { localStorage.setItem('wiso_progress', JSON.stringify(topicProgress)); }, [topicProgress]);

  const startTopic = (topicId, count = quizCount) => {
    const sel = selectedQuestions[topicId];
    const pool = QUIZ_DATA[topicId].filter((_, i) => {
      if (!sel || sel.size === 0) return true;
      if (sel.has(-1)) return false;
      return sel.has(i);
    });
    if (pool.length === 0) { alert('Keine Fragen ausgewählt!'); return; }
    const qs = [...pool]
      .sort(() => Math.random() - 0.5)
      .slice(0, count)
      .map(q => {
        const indexed = q.opts.map((opt, i) => ({ opt, correct: i === q.a }));
        indexed.sort(() => Math.random() - 0.5);
        return { ...q, opts: indexed.map(x => x.opt), a: indexed.findIndex(x => x.correct) };
      });
    setQuizQuestions(qs);
    setActiveTopic(topicId);
    setQuizQ(0);
    setSelected(null);
    setConfirmed(false);
    setAnswers([]);
    setXpGain(null);
    setScreen('quiz');
  };

  const confirmAnswer = () => {
    if (selected === null) return;
    setConfirmed(true);
    const correct = selected === quizQuestions[quizQ].a;
    setAnswers(prev => [...prev, { selected, correct }]);
  };

  const skipQuestion = () => {
    setAnswers(prev => [...prev, { selected: -1, correct: false, skipped: true }]);
    if (quizQ + 1 >= quizQuestions.length) {
      finishQuiz([...answers, { selected: -1, correct: false, skipped: true }]);
    } else {
      setQuizQ(q => q + 1);
      setSelected(null);
      setConfirmed(false);
    }
  };

  const finishQuiz = (finalAnswers) => {
    const finalScore = finalAnswers.filter(a => a.correct).length;
    const gained = finalScore * 20;
    setXp(x => x + gained);
    setXpGain(gained);
    setTopicProgress(prev => ({
      ...prev,
      [activeTopic]: Math.max(prev[activeTopic] || 0, Math.round((finalScore / quizQuestions.length) * 100))
    }));
    setAnswers(finalAnswers);
    setScreen('result');
  };

  const nextQuestion = () => {
    const newAnswers = [...answers];
    if (quizQ + 1 >= quizQuestions.length) {
      finishQuiz(newAnswers);
    } else {
      setQuizQ(q => q + 1);
      setSelected(null);
      setConfirmed(false);
    }
  };

  const toggleQuestion = (topicId, idx) => {
    setSelectedQuestions(prev => {
      const current = new Set(prev[topicId] || []);
      // if nothing selected = all selected; first toggle = deselect all except this one? No — toggle individually
      if (current.size === 0) {
        // all were selected, now deselect one: select all except this
        const all = new Set(QUIZ_DATA[topicId].map((_, i) => i));
        all.delete(idx);
        return { ...prev, [topicId]: all };
      }
      if (current.has(idx)) {
        current.delete(idx);
        if (current.size === QUIZ_DATA[topicId].length - 1 && !current.has(idx)) {
          // if only one left unchecked, special case — leave it
        }
        if (current.size === 0) return { ...prev, [topicId]: new Set() }; // all deselected = treat as all
        return { ...prev, [topicId]: current };
      } else {
        current.add(idx);
        if (current.size === QUIZ_DATA[topicId].length) return { ...prev, [topicId]: new Set() }; // all = reset
        return { ...prev, [topicId]: current };
      }
    });
  };

  const toggleAllQuestions = (topicId) => {
    setSelectedQuestions(prev => {
      const sel = prev[topicId];
      const allCount = QUIZ_DATA[topicId].length;
      // If all selected (undefined/empty) → select none (use special marker: Set with -1)
      // If none selected (Set with -1) → select all (undefined)
      // If partial → select all
      if (!sel || sel.size === 0) {
        return { ...prev, [topicId]: new Set([-1]) }; // none
      }
      return { ...prev, [topicId]: undefined }; // all
    });
  };

  const isQuestionSelected = (topicId, idx) => {
    const sel = selectedQuestions[topicId];
    if (!sel || sel.size === 0) return true; // all selected
    if (sel.has(-1)) return false; // none selected
    return sel.has(idx);
  };

  const selectedCount = (topicId) => {
    const sel = selectedQuestions[topicId];
    if (!sel || sel.size === 0) return QUIZ_DATA[topicId].length;
    if (sel.has(-1)) return 0;
    return sel.size;
  };

  const levelInfo = getLevelInfo(xp);
  const topic = TOPICS.find(t => t.id === activeTopic);
  const isMobile = useIsMobile();
  useEffect(() => { if (isMobile) setSidebarOpen(false); }, [isMobile]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', background: '#0d1117' }}>
      <TitleBar sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} xp={xp} levelInfo={levelInfo} isMobile={isMobile} />
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden', position: 'relative' }}>
        {isMobile && sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)} />}
        {sidebarOpen && (
          <div className={isMobile ? 'sidebar-drawer' : ''} style={isMobile ? { width: 280, height: '100vh' } : { height: '100%', display: 'flex' }}>
            <Sidebar topicProgress={topicProgress} activeTopic={activeTopic} onSelect={(id) => { setActiveTopic(id); setScreen('topic'); if (isMobile) setSidebarOpen(false); }} expandedTopic={expandedTopic} setExpandedTopic={setExpandedTopic} isQuestionSelected={isQuestionSelected} toggleQuestion={toggleQuestion} toggleAllQuestions={toggleAllQuestions} selectedCount={selectedCount} onStartSelected={(id) => { startTopic(id); if (isMobile) setSidebarOpen(false); }} />
          </div>
        )}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <TabBar screen={screen} activeTopic={activeTopic} setScreen={setScreen} />
          <div style={{ flex: 1, overflow: 'hidden' }}>
            {screen === 'home' && <HomeScreen onStart={startTopic} topicProgress={topicProgress} quizCount={quizCount} setQuizCount={setQuizCount} isMobile={isMobile} />}
            {screen === 'topic' && activeTopic && <TopicScreen topic={TOPICS.find(t => t.id === activeTopic)} progress={topicProgress[activeTopic] || 0} onStart={() => startTopic(activeTopic)} quizCount={quizCount} />}
            {screen === 'quiz' && quizQuestions.length > 0 && <QuizScreen question={quizQuestions[quizQ]} qNum={quizQ} total={quizQuestions.length} selected={selected} setSelected={setSelected} confirmed={confirmed} onConfirm={confirmAnswer} onNext={nextQuestion} onSkip={skipQuestion} topic={topic} />}
            {screen === 'result' && <ResultScreen score={answers.filter(a => a.correct).length} total={quizQuestions.length} xpGain={xpGain} levelInfo={levelInfo} topic={topic} onBack={() => setScreen('home')} onRetry={() => startTopic(activeTopic)} />}
          </div>
        </div>
      </div>
      <StatusBar levelInfo={levelInfo} screen={screen} activeTopic={activeTopic} />
    </div>
  );
}

      {!isMobile && <div style={{ display: 'flex', gap: 6 }}>

  );

function TabBar({ screen, activeTopic, setScreen }) {
  const topic = TOPICS.find(t => t.id === activeTopic);
  const tabs = [
    { id: 'home', label: 'dashboard.sh', icon: '⊞' },
    ...(activeTopic ? [{ id: 'topic', label: `${activeTopic}/README.md`, icon: topic?.icon }] : []),
    ...(screen === 'quiz' || screen === 'result' ? [{ id: screen, label: 'quiz.sh', icon: '▶' }] : []),
  ];
  return (
    <div style={{ background: '#0d1117', borderBottom: '1px solid #21262d', display: 'flex', height: 36, flexShrink: 0 }}>
      {tabs.map(tab => {
        const active = screen === tab.id || (tab.id === 'topic' && screen === 'topic');
        return (
          <div key={tab.id} onClick={() => setScreen(tab.id)}
            style={{ padding: '0 16px', display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, cursor: 'pointer', color: active ? '#e6edf3' : '#8b949e', background: active ? '#161b22' : 'transparent', borderRight: '1px solid #21262d', borderBottom: active ? '2px solid #58daff' : '2px solid transparent', whiteSpace: 'nowrap' }}>
            <span>{tab.icon}</span><span className="tab-label">{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function TerminalLog({ logs }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);
  return (
    <div style={{ width: 220, background: '#0a0e14', borderLeft: '1px solid #21262d', flexShrink: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '6px 10px', fontSize: 10, color: '#8b949e', letterSpacing: '0.1em', textTransform: 'uppercase', borderBottom: '1px solid #21262d', flexShrink: 0 }}>TERMINAL</div>
      <div ref={ref} style={{ flex: 1, overflowY: 'auto', padding: '8px 10px', fontSize: 10, lineHeight: 1.8 }}>
        <div style={{ color: '#56d364', marginBottom: 4 }}>user@wiso:~$ _</div>
        {logs.map((l, i) => <div key={i} style={{ color: i === logs.length - 1 ? '#e6edf3' : '#8b949e' }}>{l}</div>)}
      </div>
    </div>
  );
}

function StatusBar({ levelInfo, screen, activeTopic }) {
  return (
    <div style={{ background: '#1a7f37', height: 24, display: 'flex', alignItems: 'center', padding: '0 12px', gap: 16, fontSize: 11, color: '#d2ffd3', flexShrink: 0 }}>
      <span>⎇ main</span>
      <span style={{ color: 'rgba(210,255,211,0.5)' }}>|</span>
      <span>{screen === 'quiz' ? `Quiz: ${activeTopic}` : screen === 'home' ? 'Dashboard' : screen === 'result' ? 'Ergebnis' : `${activeTopic}/README.md`}</span>
      <div style={{ flex: 1 }} />
      <span style={{ fontSize: 10 }}>LV {levelInfo.level} — {Math.round(levelInfo.progress * 100)}% bis LV {levelInfo.level + 1}</span>
      <span style={{ color: 'rgba(210,255,211,0.5)' }}>|</span>
      <span>WiSo Terminal v2.1</span>
    </div>
  );
}

function HomeScreen({ onStart, topicProgress, quizCount, setQuizCount, isMobile }) {
  const totalQ = Object.values(QUIZ_DATA).reduce((s, qs) => s + qs.length, 0);
  const done = Object.values(topicProgress).filter(p => p >= 80).length;
  return (
    <div style={{ height: '100%', overflowY: 'auto', padding: isMobile ? '16px 16px 80px' : '24px 32px 60px' }}>
      <div style={{ marginBottom: 24 }}>
        <pre style={{ color: '#56d364', fontSize: 11, lineHeight: 1.4, margin: 0 }}>{`██╗    ██╗██╗███████╗ ██████╗
██║    ██║██║██╔════╝██╔═══██╗
██║ █╗ ██║██║███████╗██║   ██║
██║███╗██║██║╚════██║██║   ██║
╚███╔███╔╝██║███████║╚██████╔╝`}</pre>
        <div style={{ marginTop: 8, fontSize: 12, color: '#8b949e' }}><span style={{ color: '#58daff' }}>Prüfungsvorbereitung</span> · {totalQ} Fragen · {TOPICS.length} Module</div>
      </div>
      <div className="home-stats" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 20 }}>
        {[
          { label: 'Module', value: TOPICS.length, color: '#79c0ff' },
          { label: 'Bestanden (≥80%)', value: done, color: '#56d364' },
          { label: 'Fragen gesamt', value: totalQ, color: '#ffa657' },
          { label: 'Ø Fortschritt', value: `${Math.round(Object.values(topicProgress).reduce((s, p) => s + p, 0) / TOPICS.length)}%`, color: '#d2a8ff' },
        ].map(s => (
          <div key={s.label} style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 6, padding: '12px 14px' }}>
            <div style={{ fontSize: 20, fontWeight: 700, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 10, color: '#8b949e', marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 6, padding: '10px 16px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 16 }}>
        <span style={{ fontSize: 11, color: '#8b949e' }}>Fragen pro Quiz:</span>
        {[3, 5, 8, 10, 'Alle'].map(n => (
          <button key={n} onClick={() => setQuizCount(n === 'Alle' ? 999 : n)}
            style={{ background: (n === 'Alle' ? quizCount >= 999 : quizCount === n) ? '#1d4e89' : 'transparent', color: (n === 'Alle' ? quizCount >= 999 : quizCount === n) ? '#58daff' : '#8b949e', border: `1px solid ${(n === 'Alle' ? quizCount >= 999 : quizCount === n) ? '#58daff' : '#21262d'}`, borderRadius: 4, padding: '4px 12px', fontSize: 11, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace' }}>
            {n}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 10, color: '#8b949e', marginBottom: 10, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Module — klicken zum Starten</div>
      <div className="home-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 10 }}>
        {TOPICS.map(t => {
          const pct = topicProgress[t.id] || 0;
          return (
            <div key={t.id} onClick={() => onStart(t.id)}
              style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 6, padding: '14px 16px', cursor: 'pointer' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = t.color; e.currentTarget.style.background = '#1c2128'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = '#21262d'; e.currentTarget.style.background = '#161b22'; }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 18 }}>{t.icon}</span>
                  <div>
                    <div style={{ fontSize: 11, color: '#e6edf3', fontWeight: 600 }}>{t.label}/</div>
                    <div style={{ fontSize: 9, color: '#484f58', marginTop: 1 }}>{QUIZ_DATA[t.id].length} Fragen</div>
                  </div>
                </div>
                {pct > 0 && <span style={{ fontSize: 10, background: pct >= 80 ? '#0d2b10' : '#0d1a2b', color: pct >= 80 ? '#56d364' : '#58daff', padding: '2px 6px', borderRadius: 3, border: `1px solid ${pct >= 80 ? '#1a7f37' : '#1d4e89'}` }}>{pct}%</span>}
              </div>
              <div style={{ fontSize: 10, color: '#8b949e', lineHeight: 1.5, marginBottom: 8 }}>{t.desc}</div>
              {pct > 0 && <div style={{ height: 2, background: '#21262d', borderRadius: 1, marginBottom: 6 }}><div style={{ height: '100%', width: `${pct}%`, background: t.color, borderRadius: 1 }} /></div>}
              <div style={{ fontSize: 10, color: t.color, opacity: 0.7 }}>▶ quiz starten →</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TopicScreen({ topic, progress, onStart, quizCount }) {
  const qs = QUIZ_DATA[topic.id];
  return (
    <div style={{ height: '100%', overflowY: 'auto', padding: '24px 32px' }}>
      <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
        <span style={{ fontSize: 28 }}>{topic.icon}</span>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color: topic.color }}>{topic.label}/</div>
          <div style={{ fontSize: 11, color: '#8b949e', marginTop: 2 }}>{topic.desc}</div>
        </div>
      </div>
      <div style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 6, padding: '14px 16px', marginBottom: 20 }}>
        <div style={{ fontSize: 10, color: '#8b949e', marginBottom: 6 }}>FORTSCHRITT</div>
        <div style={{ height: 6, background: '#21262d', borderRadius: 3, marginBottom: 4 }}><div style={{ height: '100%', width: `${progress}%`, background: topic.color, borderRadius: 3 }} /></div>
        <div style={{ fontSize: 10, color: '#8b949e' }}>{progress}% Beste Punktzahl · {qs.length} Fragen verfügbar</div>
      </div>
      <div style={{ fontSize: 10, color: '#8b949e', marginBottom: 10, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Alle Fragen ({qs.length})</div>
      {qs.map((q, i) => (
        <div key={i} style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 4, padding: '9px 14px', marginBottom: 5, fontSize: 11, color: '#8b949e', lineHeight: 1.5 }}>
          <span style={{ color: topic.color, marginRight: 8 }}>{String(i + 1).padStart(2, '0')}.</span>{q.q}
        </div>
      ))}
      <button onClick={onStart} style={{ marginTop: 16, background: topic.color, color: '#0d1117', border: 'none', borderRadius: 5, padding: '10px 24px', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace' }}>
        ▶ Quiz starten ({Math.min(quizCount, qs.length)} Fragen)
      </button>
    </div>
  );
}

function QuizScreen({ question, qNum, total, selected, setSelected, confirmed, onConfirm, onNext, onSkip, topic }) {
  return (
    <div className="quiz-wrap" style={{ height: '100%', overflowY: 'auto', padding: '24px 32px', maxWidth: 720, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
        <div style={{ flex: 1, height: 4, background: '#21262d', borderRadius: 2 }}>
          <div style={{ height: '100%', width: `${(qNum / total) * 100}%`, background: topic?.color || '#58daff', borderRadius: 2, transition: 'width 0.3s' }} />
        </div>
        <span style={{ fontSize: 11, color: '#8b949e' }}><span style={{ color: topic?.color }}>{qNum + 1}</span>/{total}</span>
      </div>
      <div style={{ background: '#161b22', border: '1px solid #21262d', borderRadius: 8, padding: '18px 22px', marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: topic?.color, letterSpacing: '0.1em', marginBottom: 8, textTransform: 'uppercase' }}>{topic?.label} / frage_{String(qNum + 1).padStart(2, '0')}.txt</div>
        <div style={{ fontSize: 14, color: '#e6edf3', lineHeight: 1.6, fontWeight: 500 }}>{question.q}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginBottom: 16 }}>
        {question.opts.map((opt, i) => {
          const correct = question.a;
          let bg = '#161b22', border = '#21262d', color = '#c9d1d9';
          if (selected === i && !confirmed) { bg = '#1d2d44'; border = '#58daff'; color = '#e6edf3'; }
          if (confirmed) {
            if (i === correct) { bg = '#0d2b10'; border = '#1a7f37'; color = '#56d364'; }
            else if (i === selected && selected !== correct) { bg = '#2d0d0d'; border = '#da3633'; color = '#ff7b72'; }
          }
          return (
            <div key={i} onClick={() => !confirmed && setSelected(i)}
              style={{ background: bg, border: `1px solid ${border}`, borderRadius: 6, padding: '13px 14px', cursor: confirmed ? 'default' : 'pointer', color, fontSize: 13, lineHeight: 1.5, display: 'flex', alignItems: 'flex-start', gap: 10, transition: 'all 0.12s', minHeight: 48 }}
              onMouseEnter={e => { if (!confirmed && selected !== i) e.currentTarget.style.background = '#1c2128'; }}
              onMouseLeave={e => { if (!confirmed && selected !== i) e.currentTarget.style.background = '#161b22'; }}>
              <span style={{ fontWeight: 700, flexShrink: 0, color: confirmed ? (i === correct ? '#56d364' : i === selected ? '#ff7b72' : '#30363d') : (selected === i ? '#58daff' : '#30363d') }}>
                {confirmed ? (i === correct ? '✓' : i === selected ? '✗' : String.fromCharCode(65 + i)) : String.fromCharCode(65 + i)}
              </span>
              {opt}
            </div>
          );
        })}
      </div>
      {confirmed && (
        <div style={{ background: '#0d1a0d', border: '1px solid #1a7f37', borderRadius: 6, padding: '11px 14px', marginBottom: 14, fontSize: 11, color: '#8b949e', lineHeight: 1.6 }}>
          <span style={{ color: '#56d364', fontWeight: 700 }}>// Erklärung: </span>{question.explain}
        </div>
      )}
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {!confirmed ? (
          <>
            <button onClick={onConfirm} disabled={selected === null} style={{ background: selected !== null ? '#238636' : '#161b22', color: selected !== null ? '#fff' : '#484f58', border: `1px solid ${selected !== null ? '#2ea043' : '#21262d'}`, borderRadius: 5, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: selected !== null ? 'pointer' : 'not-allowed', fontFamily: 'JetBrains Mono, monospace', minHeight: 44 }}>↵ Bestätigen</button>
            <button onClick={onSkip} style={{ background: 'transparent', color: '#8b949e', border: '1px solid #21262d', borderRadius: 5, padding: '10px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace', minHeight: 44 }} onMouseEnter={e => e.currentTarget.style.borderColor = '#484f58'} onMouseLeave={e => e.currentTarget.style.borderColor = '#21262d'}>⏭ Überspringen</button>
          </>
        ) : (
          <button onClick={onNext} style={{ background: '#1d4e89', color: '#58daff', border: '1px solid #1d4e89', borderRadius: 5, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace', minHeight: 44 }}>{qNum + 1 >= total ? '⊞ Ergebnis anzeigen' : '→ Nächste Frage'}</button>
        )}
      </div>
    </div>
  );
}

function ResultScreen({ score, total, xpGain, levelInfo, topic, onBack, onRetry }) {
  const pct = Math.round((score / total) * 100);
  const color = pct >= 80 ? '#56d364' : pct >= 60 ? '#ffa657' : '#ff7b72';
  return (
    <div style={{ height: '100%', overflowY: 'auto', padding: '32px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ maxWidth: 480, width: '100%', textAlign: 'center' }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>{pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : pct >= 40 ? '📚' : '😅'}</div>
        <div style={{ fontSize: 14, color: '#8b949e', marginBottom: 20 }}>Quiz abgeschlossen: <span style={{ color: topic?.color }}>{topic?.label}</span></div>
        <div style={{ background: '#161b22', border: `1px solid ${color}40`, borderRadius: 8, padding: '24px', marginBottom: 20 }}>
          <div style={{ fontSize: 56, fontWeight: 700, color, lineHeight: 1 }}>{pct}%</div>
          <div style={{ fontSize: 13, color: '#8b949e', marginTop: 4 }}>{score} von {total} richtig</div>
          <div style={{ marginTop: 10, fontSize: 11, color: '#f0d070' }}>+{xpGain} XP verdient ⚡</div>
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 10, color: '#8b949e', marginBottom: 6, display: 'flex', justifyContent: 'space-between' }}>
              <span>Level {levelInfo.level} — {levelInfo.name}</span>
              <span>{Math.round(levelInfo.progress * 100)}% bis Level {levelInfo.level + 1}</span>
            </div>
            <div style={{ height: 6, background: '#21262d', borderRadius: 3 }}><div style={{ height: '100%', width: `${levelInfo.progress * 100}%`, background: '#f0d070', borderRadius: 3, transition: 'width 0.8s' }} /></div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
          <button onClick={onRetry} style={{ background: '#161b22', border: '1px solid #21262d', color: '#e6edf3', borderRadius: 5, padding: '9px 20px', fontSize: 12, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace' }}
            onMouseEnter={e => e.currentTarget.style.borderColor = '#58daff'} onMouseLeave={e => e.currentTarget.style.borderColor = '#21262d'}>↺ Nochmal</button>
          <button onClick={onBack} style={{ background: '#238636', border: '1px solid #2ea043', color: '#fff', borderRadius: 5, padding: '9px 20px', fontSize: 12, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace' }}>⊞ Dashboard</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
