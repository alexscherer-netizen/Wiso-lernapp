function useIsMobile() {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 600);
  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth <= 600);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return isMobile;
}

const QUIZ_DATA = {
  ausbildung: [
    { q: 'Welche Mindestangaben muss ein Berufsausbildungsvertrag enthalten?', opts: ['Art, Dauer, Ziel der Ausbildung sowie Vergütung', 'Nur Name und Adresse der Parteien', 'Nur Lohn und Urlaubstage', 'Nur Arbeitszeiten'], a: 0, explain: 'Laut BBiG §11 muss der Ausbildungsvertrag Art, sachliche und zeitliche Gliederung, Beginn, Dauer, Vergütung sowie Urlaubsdauer enthalten.' },
    { q: 'Wie lange beträgt die gesetzliche Probezeit in einer Berufsausbildung?', opts: ['Mindestens 1 Monat, höchstens 4 Monate', 'Genau 6 Monate', 'Mindestens 3 Monate, höchstens 6 Monate', 'Es gibt keine Probezeit'], a: 0, explain: 'Nach BBiG §20 beträgt die Probezeit mindestens 1 Monat und höchstens 4 Monate.' },
    { q: 'Wer sind die Partner der dualen Berufsausbildung?', opts: ['Ausbildungsbetrieb und Berufsschule', 'Nur der Ausbildungsbetrieb', 'Nur die Berufsschule', 'IHK und Arbeitsagentur'], a: 0, explain: 'Die duale Ausbildung findet an zwei Lernorten statt: im Ausbildungsbetrieb (praktisch) und in der Berufsschule (theoretisch).' },
    { q: 'Wie oft darf die Abschlussprüfung in der Berufsausbildung wiederholt werden?', opts: ['Zweimal', 'Einmal', 'Dreimal', 'Unbegrenzt oft'], a: 0, explain: 'Laut BBiG §37 kann die Abschlussprüfung zweimal wiederholt werden.' },
    { q: 'Wer sitzt im Prüfungsausschuss der IHK?', opts: ['Arbeitgeber, Arbeitnehmer und Berufsschullehrer paritätisch', 'Nur IHK-Beamte', 'Nur Arbeitgeber', 'Nur Berufsschullehrer'], a: 0, explain: 'Der Prüfungsausschuss ist paritätisch besetzt: je ein Drittel Arbeitgeber, Arbeitnehmer und Lehrkräfte (BBiG §40).' },
    { q: 'Welche Pflichten hat der Auszubildende gegenüber dem Ausbildungsbetrieb?', opts: ['Lernpflicht, Sorgfaltspflicht und Verschwiegenheitspflicht', 'Nur pünktlich erscheinen', 'Keine besonderen Pflichten', 'Nur die Berufsschule besuchen'], a: 0, explain: 'Auszubildende haben Lernpflicht, Sorgfaltspflicht und Verschwiegenheitspflicht (BBiG §13).' },
    { q: 'Welche Rechtsgrundlage regelt die Berufsausbildung in Deutschland?', opts: ['Berufsbildungsgesetz (BBiG)', 'Bürgerliches Gesetzbuch (BGB)', 'Handelsgesetzbuch (HGB)', 'Arbeitszeitgesetz (ArbZG)'], a: 0, explain: 'Das BBiG ist die zentrale Rechtsgrundlage für die Berufsausbildung. Es regelt Ausbildungsverträge, Prüfungen und Pflichten.' },
    { q: 'Wann kann ein Azubi nach der Probezeit das Ausbildungsverhältnis kündigen?', opts: ['Bei Aufgabe des Berufs oder aus wichtigem Grund mit 4 Wochen Frist', 'Jederzeit ohne Frist', 'Nur mit Genehmigung der IHK', 'Gar nicht'], a: 0, explain: 'Nach der Probezeit kann der Azubi nur bei Aufgabe der Ausbildung oder aus wichtigem Grund mit 4 Wochen Frist kündigen.' },
    { q: 'Was versteht man unter dem "Dualen System" der Berufsausbildung?', opts: ['Die Ausbildung findet an zwei Lernorten statt: Berufsschule und Ausbildungsbetrieb', 'Der Ausbildungsvertrag wird von 2 Parteien unterschrieben', 'Die IHK führt 2 verschiedene Prüfungen durch', 'Die Zusammenarbeit von Betrieb und IHK/HWK'], a: 0, explain: 'Das Duale System bedeutet: Ausbildung an zwei Lernorten gleichzeitig — praktisch im Betrieb und theoretisch in der Berufsschule.' },
    { q: 'Hannelore Haase ist 17 Jahre alt. Wie hoch ist ihr Urlaubsanspruch laut JArbSchG?', opts: ['Mindestens 25 Werktage', 'Mindestens 30 Werktage', 'Mindestens 27 Werktage', 'Mindestens 23 Werktage'], a: 0, explain: 'Laut JArbSchG §19: unter 16 Jahre → 30 Werktage, 16 Jahre → 27 Werktage, 17 Jahre → 25 Werktage. Hannelore ist 17 → mind. 25 Werktage.' },
    { q: 'In welchem Fall ist eine Verkürzung der Ausbildungszeit möglich?', opts: ['Mit Abitur ist eine Kürzung um bis zu 12 Monate möglich', 'Mit gutem Hauptschulabschluss um 9 Monate', 'Eine Kürzung ist generell nicht möglich', 'Nur durch §45 BBiG nach guten Leistungen'], a: 0, explain: 'Mit Hochschulreife (Abitur) kann die Ausbildungszeit auf Antrag um bis zu 12 Monate verkürzt werden (BBiG §45). Auch gute Leistungen während der Ausbildung können zu Verkürzung führen.' },
    { q: 'Welche Regelung im Ausbildungsvertrag wäre NICHT mit geltendem Recht vereinbar?', opts: ['Festlegung von Vertragsstrafen bei Verletzung des Ausbildungsvertrages', 'Berechnung des Urlaubs', 'Dauer der Probezeit', 'Höhe der Ausbildungsvergütung'], a: 0, explain: 'Vertragsstrafen im Ausbildungsvertrag sind laut BBiG §12 nicht zulässig und damit nichtig. Urlaub, Probezeit und Vergütung dürfen vertraglich geregelt werden.' },
    { q: 'Wo finden Sie Regelungen zur Arbeitszeit?', opts: ['Tarifvertrag', 'Handelsgesetzbuch', 'Landesverfassung', 'Bürgerliches Gesetzbuch'], a: 0, explain: 'Arbeitszeiten werden im Tarifvertrag geregelt (z.B. 38,5 Std./Woche im Elektrohandwerk). Das gesetzliche Minimum regelt das ArbZG, konkrete Branchenregelungen kommen aus Tarifverträgen.' },
    { q: 'Wo wird der Berufsausbildungsvertrag zur Eintragung eingereicht?', opts: ['Industrie- und Handelskammer (IHK) oder Handwerkskammer (HWK)', 'Berufsschule', 'Arbeitsagentur', 'Einwohnermeldeamt'], a: 0, explain: 'Der Ausbildungsvertrag wird bei der zuständigen Stelle (IHK oder HWK) eingereicht und in das Verzeichnis der Berufsausbildungsverhältnisse eingetragen (BBiG §34).' },
    { q: 'Wie lang ist die gesetzliche Kündigungsfrist während der Probezeit?', opts: ['Es gibt keine Kündigungsfrist — jederzeit ohne Frist kündbar', '6 Wochen zum Monatsende', '4 Wochen zum Monatsende', 'Während der Probezeit ist keine Kündigung möglich'], a: 0, explain: 'Während der Probezeit kann das Ausbildungsverhältnis jederzeit ohne Einhaltung einer Kündigungsfrist von beiden Seiten aufgelöst werden (BBiG §22 Abs.1).' },
    { q: 'Welches Beispiel fällt NICHT unter die Pflichten von Auszubildenden?', opts: ['Nach 6-stündiger Berufsschule ist im Betrieb die Arbeit fortzuführen', 'Maschinen sorgsam behandeln', 'Anweisungen des Ausbilders befolgen', 'Über Betriebsgeheimnisse Stillschweigen wahren'], a: 0, explain: 'Ein Auszubildender muss nach einem Berufsschultag mit mehr als 5 Stunden NICHT mehr in den Betrieb — der Tag gilt als voller Arbeitstag (JArbSchG §9). Die anderen Pflichten sind in BBiG §13 geregelt.' },
    { q: 'Wie lange ist der Pausenanspruch eines 17-Jährigen bei einem 8-Stunden-Tag?', opts: ['60 Minuten', '30 Minuten', '45 Minuten', '15 Minuten'], a: 0, explain: 'Laut JArbSchG §11: Bei mehr als 4,5 bis 6 Stunden → 30 Min. Pause; bei mehr als 6 Stunden → 60 Min. Pause. Bei 8 Stunden Arbeitszeit → 60 Minuten.' },
    { q: 'Wie lange darf ein Jugendlicher laut JArbSchG ohne Pause arbeiten?', opts: ['Maximal 4,5 Stunden', 'Maximal 6 Stunden', 'Maximal 3 Stunden', 'Maximal 8 Stunden'], a: 0, explain: 'Laut JArbSchG §11 dürfen Jugendliche nicht länger als 4,5 Stunden hintereinander ohne Pause beschäftigt werden.' },
    { q: 'Darf der Ausbilder die Pause ans Ende der Arbeitszeit legen, damit der Azubi früher gehen kann?', opts: ['Nein, das ist nach dem JArbSchG nicht erlaubt', 'Ja, wenn ein Grund vorliegt', 'Ja, wenn die Eltern zustimmen', 'Ja, da das JArbSchG in der Gastronomie nur eingeschränkt gilt'], a: 0, explain: 'Pausen müssen in angemessener zeitlicher Lage gewährt werden — frühestens 1 Stunde nach Beginn und spätestens 1 Stunde vor Ende der Arbeitszeit (JArbSchG §11). Eine Pause am Ende ist nicht erlaubt.' },
    { q: 'Ist es erlaubt, dass eine jugendliche Auszubildende nach einem Spätdienst am nächsten Tag Frühdienst macht?', opts: ['Nein, bei Wechsel von Spätdienst auf Frühdienst muss ein freier Tag eingebunden werden', 'Ja, aber mindestens 12 Stunden Freizeit müssen gewährt werden', 'Ja, wenn sie mindestens 15 Stunden Freizeit hatte', 'Nein, nach einem Spätdienst darf kein Frühdienst folgen'], a: 0, explain: 'Bei Jugendlichen im Schichtdienst muss bei einem Wechsel von Spätdienst auf Frühdienst ein freier Tag eingebunden werden (JArbSchG). Dies dient dem Gesundheitsschutz.' },
    { q: 'Wie wird ein Berufsschultag mit mehr als 5 Stunden auf die Arbeitszeit angerechnet?', opts: ['Mit 8 Stunden', 'Mit 7 Stunden', 'Mit 6 Stunden', 'Gar nicht — Berufsschule ist separate Zeit'], a: 0, explain: 'Ein Berufsschultag mit mehr als 5 Unterrichtsstunden wird mit 8 Stunden auf die wöchentliche Arbeitszeit angerechnet (JArbSchG §9). Der Azubi muss danach nicht mehr in den Betrieb.' },
    { q: 'Wer kann sich in die Jugend- und Auszubildendenvertretung (JAV) wählen lassen?', opts: ['Arbeitnehmer unter 25 Jahren und zur Berufsausbildung Beschäftigte (unabhängig vom Alter)', 'Nur Mitarbeiter unter 18 Jahren', 'Nur Mitarbeiter unter 21 Jahren', 'Alle Auszubildenden, wenn sie vom Betriebsrat zugelassen wurden'], a: 0, explain: 'In die JAV können sich Arbeitnehmer unter 25 Jahren und alle zur Berufsausbildung Beschäftigten (unabhängig vom Alter) wählen lassen (BetrVG §61).' },
    { q: 'Kann die Ausbildungszeit aufgrund guter Leistungen während der Ausbildung verkürzt werden?', opts: ['Ja, wenn Leistungen im Betrieb und in der Berufsschule dafür sprechen', 'Nein, das muss bei Beginn beantragt werden', 'Nein, die Berufsschulleistungen reichen nicht aus', 'Nein, der Ausbildungsstoff kann nicht übersprungen werden'], a: 0, explain: 'Nach BBiG §45 kann auf Antrag die Ausbildungszeit verkürzt werden, wenn gute Leistungen sowohl im Betrieb als auch in der Berufsschule vorliegen.' },
    { q: 'Wann endet das Ausbildungsverhältnis nach Bestehen der Abschlussprüfung?', opts: ['Am Tag der Bekanntgabe des Ergebnisses (Bestehen)', 'Am 31. Juli (Vertragsende)', 'Am Tag der Freisprechung', 'Am Ende des Monats, in dem die Prüfung stattfand'], a: 0, explain: 'Nach BBiG §21 endet das Ausbildungsverhältnis mit Bekanntgabe des Bestehens der Abschlussprüfung — also am Tag der Ergebnismitteilung, nicht am Vertragsende.' },
    { q: 'Wie oft kann die Abschlussprüfung wiederholt werden?', opts: ['2-mal', '1-mal', '3-mal', 'Gar nicht'], a: 0, explain: 'Nach BBiG §37 kann die Abschlussprüfung zweimal wiederholt werden, wenn sie nicht bestanden wurde.' },
    { q: 'Muss der Ausbildungsbetrieb die Ausbildung bis zur Wiederholungsprüfung verlängern?', opts: ['Ja, wenn der Auszubildende das verlangt', 'Nein, der Betrieb muss nicht zustimmen', 'Die Entscheidung trifft der Ausbildungsberater', 'Nein, wenn der Betrieb erwartet, dass die Prüfung wieder nicht bestanden wird'], a: 0, explain: 'Nach BBiG §21 Abs.3 verlängert sich das Ausbildungsverhältnis auf Verlangen des Auszubildenden bis zur nächsten Wiederholungsprüfung, höchstens jedoch um 1 Jahr.' },
    { q: 'Wo sind die Ausbildungsinhalte festgelegt und nachzulesen?', opts: ['Ausbildungsberufsbild und Ausbildungsrahmenplan', 'Ausbildungsberufsbild und Ausbildungsvertrag', 'Ausbildereignungsverordnung und Rahmenstoffplan', 'Ausbildungsrahmenplan und Prüfungsrichtlinien'], a: 0, explain: 'Die Ausbildungsinhalte stehen im Ausbildungsberufsbild (Was wird gelernt?) und im Ausbildungsrahmenplan (Wann/Wie wird es gelernt?) — beides ist Teil der Ausbildungsordnung.' },
    { q: 'Welche Frage im Personalfragebogen ist UNZULÄSSIG?', opts: ['Liegt eine Schwangerschaft vor?', 'Haben Sie einen Führerschein?', 'Welchen Schulabschluss haben Sie?', 'Welche Zensuren haben Sie in Mathematik?'], a: 0, explain: 'Die Frage nach einer Schwangerschaft ist unzulässig — sie verletzt das Allgemeine Gleichbehandlungsgesetz (AGG) und das Mutterschutzgesetz. Fragen nach Führerschein, Schulabschluss und Noten sind zulässig.' },
    { q: 'Ist für eine Ausbildung im Dualen System ein Schulabschluss vorgeschrieben?', opts: ['Nein, es gibt keinen vorgeschriebenen Schulabschluss', 'Ja, mindestens Hauptschulabschluss ist Pflicht', 'Ja, die Berufsschule nimmt nur Absolventen mit Schulabschluss', 'Nein, aber die Berufsschule wird es nicht schaffen'], a: 0, explain: 'Im Dualen System gibt es gesetzlich keinen vorgeschriebenen Schulabschluss. Es liegt im Ermessen des Ausbildungsbetriebs, wen er einstellt.' },
    { q: 'Jutta Müller ist 19 Jahre alt. Wie kommt ihr Ausbildungsvertrag zustande?', opts: ['Durch die Unterschrift von Jutta Müller und dem Vertreter des Ausbildungsbetriebes', 'Durch Unterschrift der Eltern, da sie finanziell unterstützen', 'Er bedarf einer besonderen Form, da sie volljährig ist', 'Ein mündlich geschlossener Ausbildungsvertrag wäre ausreichend'], a: 0, explain: 'Da Jutta Müller volljährig (18+) ist, unterschreibt sie selbst. Die Eltern müssen nicht zustimmen. Der Vertrag muss schriftlich abgeschlossen werden (BBiG §11).' },
    { q: 'Wie lange darf die Probezeit im Berufsausbildungsvertrag dauern?', opts: ['Zwischen 1 Monat und 4 Monaten', '3 Monate genau', 'Zwischen 1 Monat und 6 Monaten', '4 Monate genau'], a: 0, explain: 'Laut BBiG §20 muss die Probezeit mindestens 1 Monat und darf höchstens 4 Monate betragen.' },
    { q: 'Wann ist eine Verlängerung der Probezeit möglich?', opts: ['Wenn der Auszubildende 1/3 der Ausbildungszeit ausfällt (z.B. Krankheit) und dies vorher vereinbart war', 'Eine Verlängerung ist nicht vorgesehen', 'Wenn beide Parteien dies wünschen', 'Wenn noch nicht absehbar ist, ob der Azubi geeignet ist'], a: 0, explain: 'Die Probezeit kann verlängert werden, wenn der Azubi mindestens 1/3 der Probezeit krankheitsbedingt ausfällt — aber nur wenn dies im Ausbildungsvertrag vereinbart wurde (BBiG §20).' },
    { q: 'Was ist der Ausbildungsnachweis (Berichtsheft)?', opts: ['Pflichtdokumentation der Ausbildungsinhalte durch den Azubi', 'Freiwilliges Tagebuch', 'Beurteilungsbogen des Betriebs', 'Zeugnis der Berufsschule'], a: 0, explain: 'Der Ausbildungsnachweis (Berichtsheft) ist eine Pflichtdokumentation der wöchentlichen Ausbildungsinhalte und Voraussetzung zur Zulassung zur Abschlussprüfung.' },
    { q: 'Welcher Vorteil hat die duale Ausbildung gegenüber einem Studium?', opts: ['Praxisnähe, Ausbildungsvergütung, schneller Berufseinstieg', 'Höheres Gehalt nach Abschluss', 'Mehr theoretisches Wissen', 'Keine Vorteile'], a: 0, explain: 'Vorteile: direkte Praxiserfahrung, Ausbildungsvergütung vom ersten Tag, schnellerer Einstieg (2–3,5 Jahre statt 3–5 Jahre Studium).' },
    { q: 'Was passiert, wenn der Ausbildungsbetrieb die Ausbildung nicht ordnungsgemäß durchführt?', opts: ['Azubi kann außerordentlich kündigen oder Schadensersatz fordern', 'Nichts, der Azubi muss es akzeptieren', 'IHK beendet automatisch den Vertrag', 'Azubi verliert Prüfungszulassung'], a: 0, explain: 'Bei mangelhafter Ausbildung kann der Azubi außerordentlich kündigen und ggf. Schadensersatz fordern. Die IHK kann den Betrieb aus der Ausbildungsberechtigung entlassen.' },
    { q: 'Die Geschäftsführung kann Auszubildende aus wirtschaftlichen Gründen nicht übernehmen. Was gilt?', opts: ['Der Ausbildungsvertrag endet automatisch mit Fristablauf oder bestandener Prüfung', 'Der Arbeitgeber muss mit Fristen kündigen', 'Der Arbeitgeber muss weiterbeschäftigen bis ein neuer Job gefunden ist', 'Der Arbeitgeber muss mindestens 6 Monate übernehmen'], a: 0, explain: 'Der Berufsausbildungsvertrag endet automatisch mit Ablauf der Ausbildungszeit oder Bestehen der Abschlussprüfung — eine gesonderte Kündigung ist nicht notwendig (BBiG §21).' },
    { q: 'Muss der Ausbildungsbetrieb dem Auszubildenden ein Zeugnis ausstellen?', opts: ['Ja, der Betrieb ist gesetzlich verpflichtet', 'Nein, das ist freiwillig', 'Nein, die Berufsschule stellt es aus', 'Nur auf freiwilliger Basis'], a: 0, explain: 'Nach BBiG §16 ist der Ausbildungsbetrieb verpflichtet, dem Auszubildenden bei Beendigung des Ausbildungsverhältnisses ein Zeugnis auszustellen.' },
    { q: 'Was enthält ein qualifiziertes Ausbildungszeugnis zusätzlich?', opts: ['Angaben über Verhalten und Leistung des Auszubildenden', 'Unterschrift des zuständigen Ausbilders', 'Genaue Beschreibung aller Ausbildungsinhalte', 'Angaben über körperliche Leistungsfähigkeit'], a: 0, explain: 'Das qualifizierte Zeugnis enthält neben Tätigkeitsbeschreibung und Dauer auch eine Beurteilung von Führung, Leistung und Verhalten.' },
    { q: 'Wer unterschreibt das Ausbildungszeugnis?', opts: ['Der Ausbilder und der Auszubildende', 'Nur der Auszubildende', 'Der Ausbilder und ein Vertreter der Berufsschule', 'Nur der Ausbilder'], a: 0, explain: 'Das Ausbildungszeugnis wird vom Ausbilder und vom Auszubildenden unterschrieben. Die Berufsschule ist nicht beteiligt.' },
  ],
  arbeitsrecht: [
    { q: 'Was ist der Unterschied zwischen ordentlicher und außerordentlicher Kündigung?', opts: ['Ordentliche hält Fristen ein; außerordentliche ist fristlos aus wichtigem Grund', 'Ordentliche ist schriftlich; außerordentliche mündlich', 'Kein Unterschied', 'Außerordentliche braucht keine Begründung'], a: 0, explain: 'Die ordentliche Kündigung folgt gesetzlichen/vertraglichen Fristen. Die außerordentliche (fristlose) Kündigung setzt einen wichtigen Grund voraus (z.B. Diebstahl).' },
    { q: 'Ab welchem Alter gilt das Jugendarbeitsschutzgesetz (JArbSchG)?', opts: ['Für Jugendliche unter 18 Jahren', 'Unter 16 Jahren', 'Unter 21 Jahren', 'Ab 18 Jahren'], a: 0, explain: 'Das JArbSchG schützt Jugendliche (15–17 Jahre). Volljährige ab 18 unterliegen dem Arbeitszeitgesetz (ArbZG).' },
    { q: 'Welche wöchentliche Höchstarbeitszeit gilt laut ArbZG für Erwachsene?', opts: ['48 Stunden', '40 Stunden', '44 Stunden', '60 Stunden'], a: 0, explain: 'Laut ArbZG darf die werktägliche Arbeitszeit 8 Std. nicht überschreiten, in Ausnahmen 10 Std. — ergibt max. 48 Std./Woche.' },
    { q: 'Was ist ein qualifiziertes Arbeitszeugnis?', opts: ['Zeugnis mit Angaben zu Leistung und Verhalten', 'Nur Bestätigung der Beschäftigungsdauer', 'Zeugnis vom Berufsschullehrer', 'Schulabschlusszeugnis'], a: 0, explain: 'Das qualifizierte Arbeitszeugnis enthält neben der Tätigkeitsbeschreibung auch eine Beurteilung von Leistung und Verhalten.' },
    { q: 'Was versteht man unter Arbeitsschutz?', opts: ['Maßnahmen zur Sicherheit und Gesundheit am Arbeitsplatz', 'Schutz vor Kündigung', 'Tariflicher Lohnschutz', 'Datenschutz im Betrieb'], a: 0, explain: 'Arbeitsschutz umfasst alle Maßnahmen zur Verhütung von Unfällen und Erkrankungen am Arbeitsplatz (ArbSchG).' },
    { q: 'Was regelt das Mutterschutzgesetz (MuSchG)?', opts: ['Kündigungsschutz und Beschäftigungsverbote für Schwangere', 'Kindergeld-Ansprüche', 'Elternzeit für Väter', 'Betreuungsgeld'], a: 0, explain: 'Das MuSchG schützt Schwangere: Kündigungsschutz, Beschäftigungsverbote (6 Wochen vor/8 Wochen nach Geburt), Mutterschutzlohn.' },
    { q: 'In welcher Form muss eine Kündigung erfolgen?', opts: ['Schriftform (§623 BGB)', 'Mündlich reicht', 'Per E-Mail', 'Beliebig'], a: 0, explain: 'Gemäß §623 BGB bedarf die Kündigung zwingend der Schriftform. Eine mündliche oder per E-Mail übermittelte Kündigung ist unwirksam.' },
    { q: 'Was ist der gesetzliche Mindesturlaub laut BUrlG?', opts: ['24 Werktage (6-Tage-Woche) / 20 Arbeitstage (5-Tage-Woche)', '30 Tage', '14 Tage', '10 Arbeitstage'], a: 0, explain: 'Das BUrlG garantiert mindestens 24 Werktage Urlaub bei 6-Tage-Woche — entspricht 20 Arbeitstagen bei 5-Tage-Woche.' },
    { q: 'Was ist Kündigungsschutz?', opts: ['Schutz vor sozial ungerechtfertigten Kündigungen nach 6 Monaten Beschäftigung', 'Verbot jeder Kündigung', 'Schutz nur für Auszubildende', 'Nur in Großbetrieben'], a: 0, explain: 'Das KSchG schützt Arbeitnehmer nach 6 Monaten in Betrieben mit mehr als 10 Beschäftigten vor sozial ungerechtfertigten Kündigungen.' },
    { q: 'Wer überwacht die Einhaltung des Arbeitsschutzes?', opts: ['Staatliche Arbeitsschutzbehörden und Berufsgenossenschaften', 'Nur der Arbeitgeber selbst', 'Nur der Betriebsrat', 'Die IHK'], a: 0, explain: 'Die Überwachung erfolgt durch staatliche Arbeitsschutzbehörden (Gewerbeaufsichtsämter) und die gewerblichen Berufsgenossenschaften.' },
    { q: 'Was sind Arbeitszeiten laut JArbSchG für Jugendliche?', opts: ['Max. 8 Stunden/Tag, 40 Stunden/Woche, keine Nachtarbeit', 'Max. 10 Stunden/Tag', 'Gleich wie Erwachsene', 'Max. 6 Stunden/Tag'], a: 0, explain: 'Das JArbSchG begrenzt die Arbeitszeit Jugendlicher auf 8 Std./Tag und 40 Std./Woche. Nachtarbeit (ab 20 Uhr) ist grundsätzlich verboten.' },
    { q: 'Was ist der Unterschied zwischen Lohn und Gehalt?', opts: ['Lohn wird nach geleisteten Stunden gezahlt; Gehalt ist ein fixer Monatsbetrag', 'Lohn ist höher als Gehalt', 'Gehalt wird täglich gezahlt', 'Kein Unterschied'], a: 0, explain: 'Lohn ist eine zeitabhängige oder leistungsabhängige Vergütung (Stundenlohn). Gehalt ist ein fixer monatlicher Betrag unabhängig von Stunden.' },
  ],
  tarifvertrag: [
    { q: 'Was ist Tarifautonomie?', opts: ['Recht der Tarifparteien, Arbeitsbedingungen eigenständig zu regeln', 'Recht des Staates, Tariflöhne festzusetzen', 'Recht des Arbeitgebers, Löhne einseitig festzulegen', 'Recht unbeschränkt zu streiken'], a: 0, explain: 'Tarifautonomie (Art. 9 III GG) gibt Gewerkschaften und Arbeitgeberverbänden das Recht, Tarifverträge eigenverantwortlich auszuhandeln.' },
    { q: 'Was regelt ein Manteltarifvertrag?', opts: ['Allgemeine Arbeitsbedingungen (Urlaub, Kündigungsfristen, Arbeitszeit)', 'Nur Lohn und Gehalt', 'Sozialversicherungsbeiträge', 'Gewerkschaftsmitgliedschaft'], a: 0, explain: 'Der Manteltarifvertrag (MTV) regelt allgemeine Arbeitsbedingungen wie Urlaub, Arbeitszeiten, Kündigungsfristen.' },
    { q: 'Welches Gremium vertritt die Arbeitnehmer im Betrieb?', opts: ['Betriebsrat', 'Gewerkschaft', 'Vorstand', 'Aufsichtsrat'], a: 0, explain: 'Der Betriebsrat ist das gesetzliche Vertretungsorgan der Arbeitnehmer im Betrieb (Betriebsverfassungsgesetz BetrVG).' },
    { q: 'Was ist die Friedenspflicht im Tarifrecht?', opts: ['Pflicht, während der Tarifvertragslaufzeit auf Arbeitskampf zu verzichten', 'Verbot von Streiks generell', 'Pflicht zur friedlichen Kommunikation', 'Pflicht zur Schlichtung vor Gericht'], a: 0, explain: 'Die Friedenspflicht verpflichtet die Parteien, während der Laufzeit eines Tarifvertrags keine Arbeitskampfmaßnahmen zu den geregelten Punkten zu ergreifen.' },
    { q: 'Was ist ein Warnstreik?', opts: ['Kurzfristiger Streik zur Untermauerung von Tarifforderungen', 'Streik ohne Gewerkschaftsbeschluss', 'Unbefristeter Generalstreik', 'Arbeitsverweigerung ohne Gewerkschaft'], a: 0, explain: 'Ein Warnstreik ist ein kurzer Streik während laufender Tarifverhandlungen, um den Verhandlungsdruck zu erhöhen.' },
    { q: 'Wie finanzieren sich Gewerkschaften?', opts: ['Durch Mitgliedsbeiträge der Mitglieder', 'Durch staatliche Zuschüsse', 'Durch Unternehmensbeteiligungen', 'Durch Streikgelder der Arbeitgeber'], a: 0, explain: 'Gewerkschaften finanzieren sich hauptsächlich durch Mitgliedsbeiträge (ca. 1% des Bruttoeinkommens).' },
    { q: 'Was ist eine Betriebsvereinbarung?', opts: ['Schriftliche Vereinbarung zwischen Arbeitgeber und Betriebsrat', 'Tarifvertrag zwischen Gewerkschaft und Arbeitgeberverband', 'Arbeitsvertrag mit allen Mitarbeitern', 'Gesetzliche Regelung durch den Staat'], a: 0, explain: 'Eine Betriebsvereinbarung ist ein Vertrag zwischen Arbeitgeber und Betriebsrat, der innerbetriebliche Angelegenheiten regelt.' },
    { q: 'Was ist der Unterschied zwischen Gewerkschaft und Arbeitgeberverband?', opts: ['Gewerkschaft vertritt Arbeitnehmer; Arbeitgeberverband vertritt Arbeitgeber', 'Beide vertreten dieselben Interessen', 'Arbeitgeberverband ist staatlich', 'Kein Unterschied'], a: 0, explain: 'Gewerkschaften sind Zusammenschlüsse von Arbeitnehmern. Arbeitgeberverbände vertreten die Interessen der Unternehmen. Beide sind Tarifvertragsparteien.' },
    { q: 'Was ist Mitbestimmung im Aufsichtsrat?', opts: ['Arbeitnehmervertreter sitzen im Aufsichtsrat und wirken bei Entscheidungen mit', 'Nur Aktionäre bestimmen mit', 'Betriebsrat leitet das Unternehmen', 'Nur Abteilungsleiter haben Mitspracherecht'], a: 0, explain: 'Bei Unternehmen ab einer bestimmten Größe (MitbestG) sind Arbeitnehmervertreter im Aufsichtsrat vertreten.' },
    { q: 'Welche Arten von Tarifverträgen gibt es?', opts: ['Lohn-/Gehaltstarifvertrag, Manteltarifvertrag, Rahmentarifvertrag', 'Nur Lohntarifvertrag', 'Nur Manteltarifvertrag', 'Betriebs- und Staatstarifvertrag'], a: 0, explain: 'Es gibt: Entgelttarifverträge (Löhne/Gehälter), Manteltarifverträge (allgemeine Bedingungen), Rahmentarifverträge (Berufsgruppen) und Firmentarifverträge.' },
    { q: 'Ab wann ist ein Streik rechtmäßig?', opts: ['Nach Scheitern der Tarifverhandlungen, Urabstimmung und Aufruf durch Gewerkschaft', 'Jederzeit ohne Bedingungen', 'Nur mit staatlicher Genehmigung', 'Nur bei Lohnstreitigkeiten'], a: 0, explain: 'Ein rechtmäßiger Streik erfordert: gescheiterte Verhandlungen, Urabstimmung (mind. 75% Zustimmung), Streikaufruf durch eine tariffähige Gewerkschaft.' },
    { q: 'Was ist Aussperrung?', opts: ['Arbeitgeber sperrt Arbeitnehmer vom Betrieb aus als Gegenmittel zum Streik', 'Kündigung aller Mitarbeiter', 'Betriebsschließung', 'Lohnstopp'], a: 0, explain: 'Die Aussperrung ist das Kampfmittel des Arbeitgebers: Er verwehrt Arbeitnehmern den Zutritt zum Betrieb und die Lohnzahlung als Reaktion auf einen Streik.' },
    { q: 'In welchem Abstand wird der Betriebsrat gewählt?', opts: ['Alle 4 Jahre', 'Alle 3 Jahre', 'Alle 2 Jahre', 'Der Abstand wird durch die Geschäftsleitung festgelegt'], a: 0, explain: 'Der Betriebsrat wird alle 4 Jahre gewählt (§13 BetrVG). Die Wahlen finden in der Regel zwischen März und Mai statt.' },
    { q: 'Wer nimmt an der Betriebsversammlung teil?', opts: ['Alle Mitarbeiter des Betriebes', 'Nur die Gewerkschaftsmitglieder', 'Nur Gewerkschaftsmitglieder und Betriebsräte', 'Die Geschäftsleitung und der Betriebsrat'], a: 0, explain: 'An der Betriebsversammlung nehmen alle Arbeitnehmer des Betriebes teil — unabhängig von Gewerkschaftsmitgliedschaft (§42 BetrVG).' },
    { q: 'Einem Arbeitnehmer wird gekündigt ohne den Betriebsrat zu hören. Was gilt?', opts: ['Die Kündigung ist nicht wirksam, da laut BetrVG der Betriebsrat zu hören ist', 'Die Kündigung ist wirksam', 'Nur der Betriebsrat nimmt Kündigungen vor', 'Die Kündigung ist wirksam, wenn der Betriebsrat informiert wurde'], a: 0, explain: 'Nach §102 BetrVG ist der Betriebsrat vor jeder Kündigung anzuhören. Eine ohne Anhörung ausgesprochene Kündigung ist unwirksam.' },
    { q: 'Wer vertritt bei Tarifverhandlungen die Interessen der Arbeitnehmer?', opts: ['Die zuständige Gewerkschaft', 'Der Betriebsrat der Unternehmen', 'Die Sozialversicherungsverbände', 'Die Berufsgenossenschaft'], a: 0, explain: 'Bei Tarifverhandlungen vertritt die Gewerkschaft die Arbeitnehmer. Der Betriebsrat ist für innerbetriebliche Angelegenheiten zuständig — nicht für Tarifverhandlungen.' },
    { q: 'Die Pausenzeiten sollen geändert werden. Welches Recht hat der Betriebsrat?', opts: ['Mitbestimmungsrecht', 'Mitwirkungsrecht', 'Nur Informationsrecht', 'Alleinvertretungsrecht'], a: 0, explain: 'Bei der Regelung von Beginn und Ende der Arbeitszeit sowie Pausen hat der Betriebsrat ein echtes Mitbestimmungsrecht (§87 BetrVG) — die Änderung braucht seine Zustimmung.' },
    { q: 'Wer wählt die Jugend- und Auszubildendenvertretung (JAV)?', opts: ['Alle Auszubildenden (unabhängig vom Alter) und Beschäftigte unter 18 Jahren', 'Nur Auszubildende und Arbeitnehmer unter 18 Jahren', 'Nur Auszubildende unter 21 Jahren', 'Alle Mitarbeiter unter 25 Jahren'], a: 0, explain: 'Die JAV wird von allen Auszubildenden unabhängig vom Alter sowie von Arbeitnehmern unter 18 Jahren gewählt (§63 BetrVG).' },
    { q: 'In welchem Fall kann eine Maßnahme erst durch Zustimmung des Betriebsrates wirksam werden?', opts: ['Betriebsferien / Werksferien werden festgelegt', 'Neue langfristige Kredite werden aufgenommen', 'Neue Firmenwagen werden angeschafft', 'Bonuszahlungen für Vorstände werden festgelegt'], a: 0, explain: 'Die Festlegung von Betriebsferien/Werksferien ist eine Angelegenheit der Urlaubsplanung — hier hat der Betriebsrat Mitbestimmungsrecht (§87 Abs.1 Nr.5 BetrVG). Finanzentscheidungen liegen beim Arbeitgeber.' },
    { q: 'In welchem Abstand wird Ihre Personalakte einsehen. Auf welches Gesetz beziehen Sie sich?', opts: ['Betriebsverfassungsgesetz (BetrVG)', 'Bürgerliches Gesetzbuch (BGB)', 'Handelsgesetzbuch (HGB)', 'Betriebsvereinbarung'], a: 0, explain: 'Das Recht auf Einsicht in die eigene Personalakte ist in §83 BetrVG (Betriebsverfassungsgesetz) geregelt. Jeder Arbeitnehmer kann jederzeit Einsicht verlangen.' },
    { q: 'In welchem Abstand wird die Jugend- und Auszubildendenvertretung (JAV) gewählt?', opts: ['Alle 2 Jahre', 'Nach Bedarf', 'Alle 3 Jahre', 'Alle 4 Jahre'], a: 0, explain: 'Die JAV wird alle 2 Jahre gewählt (§64 BetrVG) — anders als der Betriebsrat, der alle 4 Jahre gewählt wird.' },
    { q: 'Wer trägt die Kosten für die Wahl des Betriebsrates?', opts: ['Der Arbeitgeber', 'Der Staat', 'Die Gewerkschaft', 'Der Betriebsrat selbst'], a: 0, explain: 'Die Kosten der Betriebsratswahl trägt der Arbeitgeber (§20 Abs.3 BetrVG). Dazu gehören auch Schulungskosten für Betriebsratsmitglieder.' },
    { q: 'Was ist üblicherweise im Manteltarifvertrag geregelt?', opts: ['Dauer des Urlaubs und Einstellungs-/Kündigungsbedingungen', 'Löhne und Gehälter', 'Eingruppierung in Lohn- und Gehaltsstufen', 'Krankenversicherungsbeiträge'], a: 0, explain: 'Der Manteltarifvertrag regelt allgemeine Arbeitsbedingungen: Urlaubsdauer, Kündigungsfristen, Arbeitszeiten, Einstellungsbedingungen. Löhne/Gehälter und Eingruppierungen stehen im Lohn-/Gehaltstarifvertrag.' },
    { q: 'Welche Aussagen zur Betriebsvereinbarung sind richtig?', opts: ['Sie ist ein Vertrag zwischen Arbeitgeber und Betriebsrat mit verbindlichen Normen, gilt nur für den jeweiligen Betrieb', 'Sie regelt die Gehaltsstruktur für alle Betriebe einer Branche', 'Der Betriebsrat muss immer eingeschaltet werden', 'Sie gilt bundesweit für alle Arbeitnehmer'], a: 0, explain: 'Eine Betriebsvereinbarung ist ein verbindlicher Vertrag zwischen Arbeitgeber und Betriebsrat — sie gilt nur für den Betrieb, für den sie vereinbart wurde (nicht branchenweit wie ein Tarifvertrag).' },
  ],
  sozialvers: [
    { q: 'Welche der folgenden ist KEINE Säule der Sozialversicherung?', opts: ['Hausratversicherung', 'Krankenversicherung', 'Rentenversicherung', 'Pflegeversicherung'], a: 0, explain: 'Die 5 Säulen: Kranken-, Renten-, Pflege-, Arbeitslosen- und Unfallversicherung. Die Hausratversicherung ist privat.' },
    { q: 'Wer trägt die Beiträge zur gesetzlichen Krankenversicherung?', opts: ['Arbeitnehmer und Arbeitgeber je zur Hälfte (paritätisch)', 'Ausschließlich der Arbeitnehmer', 'Ausschließlich der Arbeitgeber', 'Der Staat übernimmt alles'], a: 0, explain: 'Die GKV-Beiträge werden paritätisch geteilt — Arbeitnehmer und Arbeitgeber zahlen je die Hälfte.' },
    { q: 'Was ist der Unterschied zwischen ALG I und ALG II (Bürgergeld)?', opts: ['ALG I ist beitragsfinanziert; ALG II ist steuerfinanzierte Grundsicherung', 'ALG I ist höher als ALG II', 'ALG II wird von der Rentenversicherung gezahlt', 'Kein Unterschied'], a: 0, explain: 'ALG I ist eine beitragsfinanzierte Versicherungsleistung nach Arbeitslosigkeit. ALG II (Bürgergeld) ist steuerfinanzierte Grundsicherung für Langzeitarbeitslose.' },
    { q: 'Welche Versicherung trägt die Kosten bei Arbeitsunfällen?', opts: ['Gesetzliche Unfallversicherung (Berufsgenossenschaft)', 'Krankenversicherung', 'Rentenversicherung', 'Private Haftpflichtversicherung'], a: 0, explain: 'Die gesetzliche Unfallversicherung (Berufsgenossenschaften) deckt Arbeitsunfälle ab. Sie wird allein vom Arbeitgeber finanziert.' },
    { q: 'Wann beginnt der gesetzliche Rentenanspruch (Regelaltersgrenze)?', opts: ['67 Jahre (für Jahrgänge ab 1964)', '65 Jahre', '60 Jahre', '70 Jahre'], a: 0, explain: 'Die Regelaltersgrenze liegt für Geburtsjahrgänge ab 1964 bei 67 Jahren.' },
    { q: 'Was ist das Umlageverfahren in der Rentenversicherung?', opts: ['Heutige Beitragszahler finanzieren heutige Rentner (Generationenvertrag)', 'Jeder spart für sich selbst', 'Staat finanziert alle Renten', 'Kapitaldeckungsverfahren'], a: 0, explain: 'Im Umlageverfahren werden Beiträge der aktuell Beschäftigten direkt zur Finanzierung laufender Renten verwendet — Generationenvertrag.' },
    { q: 'Wovon hängt die Höhe der gesetzlichen Rente ab?', opts: ['Anzahl der Beitragsjahre und Höhe des Einkommens', 'Nur von der Anzahl der Beitragsjahre', 'Ist für alle gleich', 'Nur vom letzten Gehalt'], a: 0, explain: 'Die Rentenhöhe ergibt sich aus Entgeltpunkten: Wer länger und mehr verdient hat, erhält mehr Rente.' },
    { q: 'Was zählt als Arbeitsunfall?', opts: ['Unfall auf dem Weg zur Arbeit oder während der Arbeit', 'Nur Unfälle im Betriebsgebäude', 'Nur Unfälle mit Maschinen', 'Unfälle in der Freizeit'], a: 0, explain: 'Als Arbeitsunfall gilt ein Unfall in Verbindung mit der versicherten Tätigkeit — auch Wegeunfälle (direkter Weg zur/von der Arbeit) sind versichert.' },
    { q: 'Wie kann man die gesetzliche Rente aufbessern?', opts: ['Freiwillige Zusatzbeiträge, betriebliche Altersvorsorge, private Rentenversicherung', 'Gar nicht möglich', 'Nur durch längere Arbeitszeit', 'Durch Steuerersparnisse'], a: 0, explain: 'Die Rente kann durch freiwillige GRV-Beiträge, betriebliche Altersvorsorge (bAV) und private Vorsorge (Riester, private RV) ergänzt werden.' },
    { q: 'Was leistet die Pflegeversicherung?', opts: ['Finanzielle Unterstützung bei Pflegebedürftigkeit zu Hause oder im Heim', 'Kostenlose Krankenhausbehandlung', 'Invalidenrente', 'Hinterbliebenenversorgung'], a: 0, explain: 'Die Pflegeversicherung zahlt Leistungen bei Pflegebedürftigkeit: Pflegegeld, Pflegesachleistungen oder Heimkosten (teilweise).' },
    { q: 'Was sind Leistungen der Arbeitslosenversicherung (ALG I)?', opts: ['60% (ohne Kinder) bzw. 67% (mit Kindern) des letzten Nettoentgelts', '100% des letzten Gehalts', 'Festbetrag unabhängig vom Gehalt', '50% des Bruttolohns'], a: 0, explain: 'ALG I beträgt 60% des pauschalierten Nettoentgelts (67% für Arbeitslose mit Kindern). Die Bezugsdauer hängt von der Versicherungszeit ab.' },
    { q: 'Was ist die Beitragsbemessungsgrenze in der Krankenversicherung?', opts: ['Einkommensgrenze, bis zu der KV-Beiträge berechnet werden', 'Maximalbetrag der KV-Leistungen', 'Grenze zwischen GKV und PKV', 'Mindesteinkommen für Pflichtversicherung'], a: 0, explain: 'Die Beitragsbemessungsgrenze ist die Einkommensgrenze, bis zu der Beiträge zur GKV erhoben werden. Einkommen darüber bleibt beitragsfrei.' },
    { q: 'Welche Versicherung gehört NICHT zu den gesetzlichen Sozialversicherungen?', opts: ['Lebensversicherung', 'Krankenversicherung', 'Rentenversicherung', 'Arbeitslosenversicherung'], a: 0, explain: 'Die 5 gesetzlichen Sozialversicherungen: Kranken-, Renten-, Pflege-, Arbeitslosen- und Unfallversicherung. Die Lebensversicherung ist eine private Versicherung.' },
    { q: 'Für welche gesetzliche Sozialversicherung zahlt allein der Arbeitgeber die Beiträge?', opts: ['Unfallversicherung', 'Krankenversicherung', 'Rentenversicherung', 'Pflegeversicherung'], a: 0, explain: 'Die gesetzliche Unfallversicherung wird ausschließlich vom Arbeitgeber finanziert. Alle anderen Sozialversicherungen werden paritätisch (je hälftig) von AG und AN getragen.' },
    { q: 'Welche Sozialversicherung wurde im Jahr 1995 eingeführt?', opts: ['Pflegeversicherung', 'Krankenversicherung', 'Unfallversicherung', 'Arbeitslosenversicherung'], a: 0, explain: 'Die gesetzliche Pflegeversicherung (SGB XI) wurde 1995 als jüngste Säule der Sozialversicherung eingeführt — als Reaktion auf den wachsenden Pflegebedarf der alternden Gesellschaft.' },
    { q: 'Wie heißt der Träger der gesetzlichen Unfallversicherung?', opts: ['Berufsgenossenschaften', 'Bundesagentur für Arbeit', 'Allgemeine Ortskrankenkassen', 'Ersatzkassen'], a: 0, explain: 'Die gesetzliche Unfallversicherung wird von den Berufsgenossenschaften (für die Wirtschaft) und Unfallkassen (für den öffentlichen Bereich) getragen.' },
    { q: 'Zu welcher Gruppe gehört die "Techniker Krankenkasse"?', opts: ['Zu den Ersatzkassen', 'Zu den Allgemeinen Ortskrankenkassen', 'Zu den Pflegeversicherungen', 'Zu den Privatkassen'], a: 0, explain: 'Die Techniker Krankenkasse (TK) ist eine Ersatzkasse. Ersatzkassen wurden ursprünglich für bestimmte Berufsgruppen gegründet und stehen heute allen offen.' },
    { q: 'Welche Leistung wird von der Arbeitslosenversicherung getragen?', opts: ['Kurzarbeitergeld', 'Krankengeld', 'Übergangsgeld nach Arbeitsunfall', 'Rente wegen Minderung der Erwerbsfähigkeit'], a: 0, explain: 'Die Arbeitslosenversicherung zahlt: ALG I, Kurzarbeitergeld, Insolvenzgeld. Krankengeld → GKV. Übergangsgeld nach Unfall → Unfallversicherung. Erwerbsminderungsrente → Rentenversicherung.' },
    { q: 'Paul Müller verunfallt auf dem Weg zur Arbeit. Welche Versicherung zahlt?', opts: ['Unfallversicherung', 'Krankenversicherung', 'Pflegeversicherung', 'KFZ-Versicherung'], a: 0, explain: 'Wegeunfälle (auf dem direkten Weg zur/von der Arbeit) sind gesetzliche Arbeitsunfälle und werden von der Unfallversicherung (Berufsgenossenschaft) übernommen.' },
    { q: 'Welche der genannten Versicherungen ist eine Individualversicherung?', opts: ['Haftpflichtversicherung', 'Gesetzliche Pflegeversicherung', 'Gesetzliche Rentenversicherung', 'Arbeitslosenversicherung'], a: 0, explain: 'Die Haftpflichtversicherung ist eine private Individualversicherung — freiwillig, individuell abgeschlossen. Alle gesetzlichen Sozialversicherungen sind Pflichtversicherungen.' },
    { q: 'Wer nimmt die Einstufung in die 5 Pflegegrade vor?', opts: ['Der Medizinische Dienst der Krankenversicherung (MDK)', 'Der Hausarzt', 'Die Angehörigen', 'Der Durchgangsarzt / Unfallarzt'], a: 0, explain: 'Die Einstufung in die Pflegegrade 1–5 erfolgt durch den Medizinischen Dienst der Krankenversicherung (MDK) nach einem Hausbesuch und Begutachtung des Pflegebedürftigen.' },
    { q: 'Was bedeutet die Beitragsbemessungsgrenze in der Sozialversicherung?', opts: ['Bis zu diesem Betrag werden Beiträge erhoben; darüber liegendes Einkommen bleibt beitragsfrei', 'Ab dieser Grenze zahlt nur der Arbeitgeber', 'Ab dieser Grenze zahlt nur der Arbeitnehmer', 'Bruttogehälter dürfen diese Grenze nicht überschreiten'], a: 0, explain: 'Die Beitragsbemessungsgrenze (BBG) legt fest, bis zu welchem Einkommen Beiträge zur Sozialversicherung erhoben werden. Darüber liegendes Einkommen ist beitragsfrei.' },
    { q: 'Wer trägt die Kosten der gesetzlichen Unfallversicherung?', opts: ['Der Arbeitgeber trägt die Kosten allein', 'Arbeitgeber und Arbeitnehmer je 50%', 'Der Arbeitnehmer allein', 'Der Staat übernimmt die Kosten'], a: 0, explain: 'Die gesetzliche Unfallversicherung wird ausschließlich vom Arbeitgeber finanziert — als Ausgleich dafür, dass Arbeitnehmer im Gegenzug auf Schadensersatzklagen gegen den Arbeitgeber bei Arbeitsunfällen verzichten.' },
    { q: 'In welchem Abstand wird die Sozialwahl durchgeführt?', opts: ['Alle 6 Jahre', 'Jedes Jahr', 'Alle 2 Jahre', 'Alle 4 Jahre'], a: 0, explain: 'Die Sozialwahl findet alle 6 Jahre statt. Versicherte wählen die Selbstverwaltungsorgane (Verwaltungsräte) der gesetzlichen Sozialversicherungsträger.' },
  ],
  wirtschaft: [
    { q: 'Was beschreibt die soziale Marktwirtschaft?', opts: ['Freie Marktwirtschaft mit staatlichen Korrekturen zum sozialen Ausgleich', 'Vollständige staatliche Planwirtschaft', 'Reine Privatwirtschaft ohne Eingriffe', 'Nur staatliche Unternehmen'], a: 0, explain: 'Die soziale Marktwirtschaft kombiniert freien Markt mit sozialer Absicherung durch den Staat (Konzept Müller-Armack / Erhard).' },
    { q: 'Was kennzeichnet eine Planwirtschaft?', opts: ['Staatliche Planung und Steuerung; kein freier Markt', 'Freier Markt ohne staatliche Eingriffe', 'Mischung aus Plan und Markt', 'Alle Unternehmen sind börsennotiert'], a: 0, explain: 'In der Planwirtschaft plant und kontrolliert der Staat Produktion, Preise und Verteilung (z.B. DDR, UdSSR).' },
    { q: 'Was sind die vier Phasen des Konjunkturzyklus?', opts: ['Expansion, Boom, Rezession, Depression', 'Wachstum, Stagnation, Rückgang, Erholung', 'Inflation, Deflation, Stagflation, Normalisierung', 'Angebot, Nachfrage, Gleichgewicht, Ungleichgewicht'], a: 0, explain: 'Der Konjunkturzyklus: Expansion (Aufschwung) → Boom (Hochkonjunktur) → Rezession (Abschwung) → Depression (Tiefpunkt).' },
    { q: 'Was ist Globalisierung?', opts: ['Weltweite Verflechtung von Märkten, Wirtschaft, Politik und Kulturen', 'Nur internationaler Warenhandel', 'Europäische Wirtschaftsunion', 'Abschottung nationaler Märkte'], a: 0, explain: 'Globalisierung: zunehmende weltweite Verflechtung in Wirtschaft, Politik, Kommunikation und Kultur — ermöglicht durch Digitalisierung und Transport.' },
    { q: 'Was ist Wirtschaftlichkeit?', opts: ['Verhältnis von Ertrag zu Aufwand (Output/Input)', 'Gewinnanstieg eines Unternehmens', 'Staatliche Effizienz', 'Marktanteil eines Unternehmens'], a: 0, explain: 'Wirtschaftlichkeit = Ertrag / Aufwand. Wirtschaftlich handeln: mit minimalem Einsatz maximalen Erfolg erzielen.' },
    { q: 'Was ist Produktivität?', opts: ['Verhältnis von Produktionsmenge zu eingesetzten Produktionsfaktoren', 'Gewinn eines Unternehmens', 'Anzahl der Mitarbeiter', 'Umsatz pro Jahr'], a: 0, explain: 'Produktivität = Ausbringungsmenge / Faktoreinsatz. Sie misst, wie effizient Arbeit, Kapital und Boden eingesetzt werden.' },
    { q: 'Was ist Rentabilität?', opts: ['Verhältnis von Gewinn zum eingesetzten Kapital', 'Jährlicher Umsatz', 'Verhältnis von Produktion zu Kosten', 'Liquiditätskennzahl'], a: 0, explain: 'Rentabilität = Gewinn / Kapital × 100 %. Sie zeigt, wie effizient Kapital Gewinn erwirtschaftet.' },
    { q: 'Was passiert bei einem Angebotsüberschuss?', opts: ['Preis sinkt', 'Preis steigt', 'Preis bleibt gleich', 'Nachfrage steigt automatisch'], a: 0, explain: 'Bei Angebotsüberschuss (Angebot > Nachfrage) sinkt der Preis — Anbieter müssen günstiger werden, um ihre Produkte loszuwerden.' },
    { q: 'Welche staatlichen Instrumente gibt es zur Konjunktursteuerung?', opts: ['Geldpolitik (EZB), Fiskalpolitik (Steuern/Ausgaben) und Strukturpolitik', 'Nur Steuersenkungen', 'Nur Zinspolitik der EZB', 'Nur Exportförderung'], a: 0, explain: 'Konjunktursteuerung: Fiskalpolitik (Steuern/Staatsausgaben), Geldpolitik (EZB: Zinsen, Geldmenge), Strukturpolitik (langfristige Investitionen).' },
    { q: 'Was versteht man unter dem ökonomischen Prinzip?', opts: ['Mit geringstem Einsatz größten Erfolg erzielen (Minimal- oder Maximalprinzip)', 'Gewinnmaximierung um jeden Preis', 'Staatliche Preisregulierung', 'Gleichverteilung aller Güter'], a: 0, explain: 'Ökonomisches Prinzip: Minimalprinzip (Ziel mit minimalem Aufwand) oder Maximalprinzip (mit gegebenem Aufwand maximales Ergebnis).' },
    { q: 'Was ist Inflation?', opts: ['Anhaltender Anstieg des Preisniveaus / Kaufkraftverlust', 'Rückgang der Produktion', 'Anstieg der Arbeitslosigkeit', 'Staatliche Preisobergrenze'], a: 0, explain: 'Inflation: anhaltender allgemeiner Anstieg des Preisniveaus. Die Kaufkraft des Geldes nimmt ab.' },
    { q: 'Was ist eine Rezession?', opts: ['Wirtschaftlicher Abschwung — BIP schrumpft mindestens zwei Quartale in Folge', 'Wirtschaftliches Wachstum', 'Staatsbankrott', 'Deflationsphase'], a: 0, explain: 'Eine Rezession liegt vor, wenn das BIP mindestens zwei aufeinanderfolgende Quartale schrumpft. Kennzeichen: steigende Arbeitslosigkeit, sinkende Investitionen.' },
  ],
  rechtsformen: [
    { q: 'Was ist das Mindestkapital einer GmbH?', opts: ['25.000 €', '50.000 €', '10.000 €', '1 €'], a: 0, explain: 'Das Mindeststammkapital einer GmbH beträgt 25.000 € (§5 GmbHG). Die Hälfte muss bei Gründung eingezahlt werden.' },
    { q: 'Bei welcher Rechtsform haften die Gesellschafter unbeschränkt mit Privatvermögen?', opts: ['OHG (Offene Handelsgesellschaft)', 'GmbH', 'AG', 'GmbH & Co. KG'], a: 0, explain: 'Bei der OHG haften alle Gesellschafter unbeschränkt, unmittelbar und solidarisch — auch mit dem Privatvermögen.' },
    { q: 'Was unterscheidet Komplementär und Kommanditist in einer KG?', opts: ['Komplementär haftet unbeschränkt; Kommanditist nur bis zur Einlage', 'Kommanditist haftet unbeschränkt', 'Beide haften gleich', 'Komplementär hat kein Stimmrecht'], a: 0, explain: 'In der KG haftet der Komplementär voll, der Kommanditist nur in Höhe seiner Einlage.' },
    { q: 'Welche Rechtsform hat die größte Kapitalbeschaffungsmöglichkeit?', opts: ['AG (Aktiengesellschaft)', 'GmbH', 'Einzelunternehmen', 'GbR'], a: 0, explain: 'Die AG kann durch Ausgabe von Aktien an der Börse Kapital aufnehmen — ideal für große Kapitalbeschaffung.' },
    { q: 'Was sind Kaufmannseigenschaften nach HGB?', opts: ['Wer ein Handelsgewerbe betreibt, ist Kaufmann und unterliegt dem HGB', 'Wer eine kaufmännische Ausbildung hat', 'Jeder Unternehmer ist Kaufmann', 'Nur GmbH und AG sind Kaufleute'], a: 0, explain: 'Nach HGB §1 ist Kaufmann, wer ein Handelsgewerbe betreibt. Kaufleute haben Buchführungspflicht, Handelsregisterpflicht und unterliegen dem HGB.' },
    { q: 'Was ist der Unterschied zwischen Personen- und Kapitalgesellschaften?', opts: ['Personenges.: persönliche Haftung; Kapitalges.: Haftung auf Einlage begrenzt', 'Kapitalges. haben mehr Gesellschafter', 'Personenges. brauchen mehr Kapital', 'Kein Unterschied'], a: 0, explain: 'Personengesellschaften (OHG, KG): persönliche Haftung. Kapitalgesellschaften (GmbH, AG): beschränkte Haftung auf Einlage.' },
    { q: 'Was ist das Mindestkapital einer AG?', opts: ['50.000 €', '25.000 €', '100.000 €', '10.000 €'], a: 0, explain: 'Das Mindestgrundkapital einer AG beträgt 50.000 € (§7 AktG). Die Aktien werden auf Nennbeträge von mindestens 1 € ausgestellt.' },
    { q: 'Was ist eine GbR?', opts: ['Gesellschaft bürgerlichen Rechts — einfachste Personengesellschaft, keine Formvorschriften', 'Gesellschaft mit beschränkter Haftung', 'Genossenschaft mit begrenzter Risikoübernahme', 'Staatliche Gesellschaftsform'], a: 0, explain: 'Die GbR (§705 BGB) ist die einfachste Personengesellschaft: kein Mindestkapital, kein Notar nötig. Alle Gesellschafter haften unbeschränkt.' },
    { q: 'Was ist ein Einzelunternehmen?', opts: ['Unternehmen einer natürlichen Person mit voller persönlicher Haftung', 'Unternehmen mit nur einem Angestellten', 'GmbH mit einem Gesellschafter', 'Freiberufliche Tätigkeit'], a: 0, explain: 'Ein Einzelunternehmen wird von einer natürlichen Person geführt, die mit gesamtem Privat- und Geschäftsvermögen haftet.' },
    { q: 'Welche Organe hat eine GmbH?', opts: ['Gesellschafterversammlung und Geschäftsführer (Aufsichtsrat optional)', 'Nur Geschäftsführer', 'Vorstand, Aufsichtsrat und Hauptversammlung', 'Nur Gesellschafterversammlung'], a: 0, explain: 'Eine GmbH hat obligatorisch die Gesellschafterversammlung (oberstes Organ) und den Geschäftsführer. Ab 500 Arbeitnehmern ist ein Aufsichtsrat Pflicht.' },
    { q: 'Welche Organe hat eine AG?', opts: ['Vorstand, Aufsichtsrat und Hauptversammlung', 'Nur Vorstand und Aufsichtsrat', 'Geschäftsführer und Gesellschafterversammlung', 'Nur Hauptversammlung'], a: 0, explain: 'Die AG hat drei Pflichtorgane: Vorstand (Geschäftsführung), Aufsichtsrat (Kontrolle des Vorstands) und Hauptversammlung (Aktionäre, oberstes Beschlussorgan).' },
    { q: 'Wie heißt der Vollhafter bei einer KG?', opts: ['Komplementär', 'Kommanditist', 'Geschäftsführer', 'Sekretär'], a: 0, explain: 'In der KG heißt der unbeschränkt haftende Gesellschafter Komplementär. Der Kommanditist haftet nur mit seiner Einlage.' },
    { q: 'Welche der folgenden Unternehmen sind Kapitalgesellschaften?', opts: ['AG und GmbH', 'OHG und KG', 'GbR und Einzelunternehmen', 'KG und GmbH & Co. KG'], a: 0, explain: 'Kapitalgesellschaften sind AG und GmbH — beide haben eigene Rechtspersönlichkeit und beschränken die Haftung auf das Gesellschaftsvermögen.' },
    { q: 'Zwei Gesellschafter haften voll, einer nur mit seiner Einlage. Welche Rechtsform passt?', opts: ['KG (Kommanditgesellschaft)', 'OHG', 'GmbH', 'AG'], a: 0, explain: 'Bei der KG gibt es Komplementäre (volle Haftung) und Kommanditisten (Haftung nur mit Einlage). Im Beispiel: 2 Komplementäre + 1 Kommanditistin = KG.' },
    { q: 'Was ist eine Genossenschaft (e.G.)?', opts: ['Zusammenschluss zur gemeinsamen wirtschaftlichen Förderung der Mitglieder', 'Zusammenschluss aus politischen Gründen', 'Gewinnmaximierung durch Zusammenlegung', 'Staatliche Unternehmensform'], a: 0, explain: 'Eine eingetragene Genossenschaft (e.G.) ist ein Zusammenschluss, bei dem die Mitglieder sich gegenseitig wirtschaftlich fördern wollen. Sie ist eine juristische Person.' },
    { q: 'Was ist das Ziel einer Genossenschaft?', opts: ['Wirtschaftliche Förderung der Mitglieder, nicht Gewinnmaximierung', 'Möglichst hohe Dividenden', 'Staatliche Subventionen erhalten', 'Marktführerschaft erreichen'], a: 0, explain: 'Das Ziel einer Genossenschaft ist die Förderung des Erwerbs oder der Wirtschaft ihrer Mitglieder — nicht Gewinnmaximierung wie bei einer AG.' },
    { q: 'Ist eine OHG eine juristische Person?', opts: ['Nein, die Gesellschafter sind persönlich vertretungsberechtigt', 'Ja, da sie im Handelsregister eingetragen ist', 'Ja, alle Gesellschaften ab einem gewissen Umsatz sind juristische Personen', 'Nein, da keine Organe benötigt werden'], a: 0, explain: 'Die OHG ist keine juristische Person — sie ist eine Personengesellschaft. Die Gesellschafter sind direkt vertretungsberechtigt und haften persönlich. Juristische Personen sind z.B. GmbH und AG.' },
    { q: 'Unter welchen Voraussetzungen kann man ins Handelsregister einsehen?', opts: ['Keine Voraussetzungen — jeder kann ohne Begründung Einsicht nehmen', 'Man muss eine Geschäftsbeziehung nachweisen', 'Man braucht formlose Erlaubnis der Firma', 'Man muss einen berechtigten Grund nennen'], a: 0, explain: 'Das Handelsregister ist öffentlich — jeder kann ohne Angabe von Gründen Einsicht nehmen oder Ausdrucke anfordern (§9 HGB). Das dient der Transparenz im Geschäftsverkehr.' },
    { q: 'Welche sind Merkmale eines Einzelunternehmens?', opts: ['Inhaber haftet mit Firmen- und Privatvermögen; Entscheidungen können schnell getroffen werden', 'Besonders kreditwürdig bei Banken', 'Inhaber haftet nur mit Firmenvermögen', 'Mindestkapital von 25.000 € erforderlich'], a: 0, explain: 'Beim Einzelunternehmen haftet der Inhaber unbeschränkt mit Privat- und Geschäftsvermögen. Vorteil: schnelle Entscheidungsfindung ohne Rücksprache. Nachteil: volles persönliches Risiko.' },
    { q: 'Ab wann ist eine GmbH fähig, Rechtsgeschäfte abzuschließen?', opts: ['Mit der Eintragung ins Handelsregister', 'Ab dem Zeitpunkt den die Gesellschafter bestimmen', 'Mit der Unterschrift des Gesellschaftervertrags', 'Dem Gründungsmonat nachfolgenden Monatsersten'], a: 0, explain: 'Die GmbH erlangt ihre Rechtspersönlichkeit (und damit volle Rechtsfähigkeit) mit der Eintragung ins Handelsregister (§11 GmbHG). Vorher existiert sie nur als Vor-GmbH.' },
    { q: 'Der Kurs einer Aktie sinkt von 132,50€ auf 112,30€. Was gilt für den Nennwert?', opts: ['Der Kursrückgang wirkt sich nicht auf den Nennwert der Aktie aus', 'Der Nennwert ist gesunken', 'Der Nennwert ist gestiegen', 'Durch erhöhte Nachfrage ist der Kurs gesunken'], a: 0, explain: 'Der Kurswert (Börsenkurs) schwankt täglich je nach Angebot und Nachfrage. Der Nennwert ist der aufgedruckte Wert der Aktie — er ändert sich nicht durch Kursbewegungen.' },
    { q: 'Um welche Gesellschaftsform handelt es sich bei „Druckerei Müller GmbH & Co. KG“?', opts: ['Kommanditgesellschaft (KG)', 'GmbH', 'Offene Handelsgesellschaft', 'Aktiengesellschaft'], a: 0, explain: 'GmbH & Co. KG ist eine KG, bei der der Komplementär (vollhaftender Gesellschafter) eine GmbH ist. Dadurch wird die persönliche Haftung der natürlichen Personen beschränkt.' },
    { q: 'Wer haftet bei einer Aktiengesellschaft (AG)?', opts: ['Die AG haftet mit ihrem Gesellschaftsvermögen', 'Der Aktionär haftet mit dem Kurswert seiner Aktie', 'Vorstand und Aufsichtsrat haften gesamtschuldnerisch', 'Der Vorstand haftet unbeschränkt'], a: 0, explain: 'Bei der AG haftet ausschließlich die Gesellschaft (juristische Person) mit ihrem Vermögen. Aktionäre riskieren nur ihren Aktienwert — keine persönliche Haftung.' },
    { q: 'Welches Unternehmen ist eine Personengesellschaft?', opts: ['Peter Meier, Maschinenbau (Einzelunternehmen)', 'Müller Feinkost GmbH', 'Kaewel Maschinen AG', 'Meierei Ostsee e.G.'], a: 0, explain: 'Ein Einzelunternehmen (wie Peter Meier, Maschinenbau) gehört zu den Personenunternehmen. GmbH und AG sind Kapitalgesellschaften, e.G. ist eine Genossenschaft.' },
  ],
  kaufvertrag: [
    { q: 'Ein Kunde kauft am 14.03. ein Fernsehgerät mit vertraglichem Liefertermin 28.03. Wie nennt man diesen Kauf?', opts: ['Fixkauf', 'Ratenkauf', 'Kauf auf Abruf', 'Spezifikationskauf'], a: 0, explain: 'Ein Fixkauf liegt vor, wenn ein bestimmter Liefertermin vertraglich vereinbart ist und die Einhaltung wesentlich ist. Bei Nichtlieferung kann der Käufer sofort zurücktreten.' },
    { q: 'Welche Rechte hat ein Käufer bei Lieferung einer mangelhaften Ware?', opts: ['Nachfüllung, Rücktritt, Minderung, Schadensersatz, Ersatz vergeblicher Aufwendungen', 'Nur Nachfüllung', 'Nachfüllung, Rücktritt, Minderung, Vertragsstrafe', 'Recht auf Nachfüllung kann er nicht in Anspruch nehmen'], a: 0, explain: 'Bei mangelhafter Ware hat der Käufer nach §437 BGB: 1. Nachfüllung (Reparatur oder Ersatzlieferung), 2. Rücktritt, 3. Minderung, 4. Schadensersatz, 5. Ersatz vergeblicher Aufwendungen.' },
    { q: 'Ein Verkäufer muss eine Ware entsprechend einer festgelegten Probe liefern. Wie heißt dieser Vertrag?', opts: ['Kauf nach Probe', 'Fixkauf', 'Kauf auf Probe', 'Kauf auf Abruf'], a: 0, explain: 'Kauf nach Probe: Die Probe wird vor Vertragsabschluss besichtigt und dient als verbindliche Qualitätsreferenz für die Lieferung. Kauf auf Probe: Der Käufer kann die Ware erst testen, dann entscheiden.' },
    { q: 'Wann sind Mängel beim Handelskauf zu rügen?', opts: ['Offene Mängel sofort rügen, versteckte unverzüglich nach Entdeckung', 'Alle Mängel sofort rügen', 'Innerhalb 14 Tagen prüfen und 21 Tagen rügen', 'Innerhalb 21 Tagen prüfen und 28 Tagen rügen'], a: 0, explain: 'Beim Handelskauf (§377 HGB): Ware bei Eingang kontrollieren, offene Mängel sofort rügen, versteckte Mängel unverzüglich nach Entdeckung. Bei Versäumnis gilt die Ware als genehmigt.' },
    { q: 'Wie kommt ein Kaufvertrag zustande?', opts: ['Durch Antrag (Angebot) und Annahme', 'Durch Anfrage und Angebot', 'Durch Kundensbestätigung und Mahnung', 'Durch Angebot und Verhandlung'], a: 0, explain: 'Ein Kaufvertrag kommt durch zwei übereinstimmende Willenserklärungen zustande: Antrag (Angebot) des Verkäufers und Annahme des Käufers (§145 ff. BGB).' },
    { q: 'In welche Gruppe gehören Kaufverträge mit höherem Aspekt auf die Lieferzeit?', opts: ['Terminkauf, Fixkauf, Kauf auf Abruf', 'Terminkauf, Kauf zur Probe, Barkauf', 'Kauf nach Probe, Fixkauf, Kauf auf Abruf', 'Kauf nach Probe, Kauf zur Probe, Bestimmungskauf'], a: 0, explain: 'Kaufverträge mit besonderer Bedeutung des Lieferzeitpunkts: Terminkauf (Liefertermin vereinbart), Fixkauf (Termin wesentlich), Kauf auf Abruf (Käufer ruft Ware ab).' },
    { q: 'Wie nennt man einen Kauf mit der Absicht, bei Zufriedenheit eine größere Menge zu erwerben?', opts: ['Kauf zur Probe', 'Kauf auf Abruf', 'Kauf nach Probe', 'Bestimmungskauf'], a: 0, explain: 'Kauf zur Probe: Kleinstmenge wird gekauft, um die Qualität zu prüfen. Bei Zufriedenheit werden größere Mengen bestellt. Der Kauf ist bereits mit der Probe endgültig.' },
    { q: 'Was ist unter „Holschuld“ beim Kaufvertrag zu verstehen?', opts: ['Der Käufer muss die bereitgestellte Ware beim Verkäufer abholen', 'Verkäufer kann bei Nichtbezahlung Ware zurückholen', 'Käufer muss Abholkosten bezahlen', 'Käufer muss Kaufpreis beim Abholen bezahlen'], a: 0, explain: 'Holschuld (Abholschuld): Der Käufer ist verpflichtet, die Ware beim Verkäufer abzuholen. Gegenteil: Schickschuld (Verkäufer versendet) oder Bringschuld (Verkäufer liefert direkt).' },
    { q: 'Was sind richtige Aussagen zum Gerichtsstand?', opts: ['Mit dem Gerichtsstand wird festgelegt wo Rechtsstreitigkeiten verhandelt werden; gesetzlicher Gerichtsstand = Wohnsitz des Beklagten', 'Gerichtsstand ist immer der Firmensitz des Verkäufers', 'Gerichtsstand = Wohnsitz des Klägers', 'Gerichtsstand kann nicht vereinbart werden'], a: 0, explain: 'Mit dem Gerichtsstand wird festgelegt, an welchem Ort Rechtsstreitigkeiten verhandelt werden. Der gesetzliche Gerichtsstand ist der Wohnsitz des Beklagten (§13 ZPO). Per Vertrag kann ein anderer vereinbart werden.' },
    { q: 'Wann kommt ein Lieferant ohne Mahnung in Lieferverzug?', opts: ['Bei kalendermäßig festgelegtem Liefertermin bei Überschreitung des Termins; oder wenn er erklärt nicht liefern zu können', 'Nur nach Empfang einer Mahnung', 'Nur bei Fixgeschäften', 'Lieferverzug gibt es nur beim Handelskauf'], a: 0, explain: 'Automatischer Verzug ohne Mahnung: 1) Liefertermin ist kalendermäßig bestimmt und wird überschritten (§286 Abs.2 BGB), 2) Lieferant erklärt er wird nicht liefern.' },
    { q: 'Was muss beim Kauf eines Grundstüks beachtet werden?', opts: ['Kaufverträge für Grundstücke müssen notariell beurkundet werden', 'Kaufvertrag kann mündlich abgeschlossen werden', 'Unterschriften müssen beglaubigt sein', 'Kaufpreis ist sofort zu zahlen'], a: 0, explain: 'Grundstückkaufverträge bedürfen zwingend der notariellen Beurkundung (§311b BGB). Ohne Notar ist der Vertrag nichtig. Zusätzlich ist die Eintragung ins Grundbuch nötig.' },
    { q: 'Was bedeutet der Eigentumsvorbehalt („Ware bleibt bis vollständiger Bezahlung Eigentum des Verkäufers“)?', opts: ['Verkäufer bleibt Eigentümer, Käufer nur Besitzer; bei Nichtzahlung kann Verkäufer Herausgabe verlangen', 'Verkäufer und Käufer werden hälftig Eigentümer', 'Verkäufer bleibt Besitzer, Käufer wird Eigentümer', 'Keine rechtliche Wirkung'], a: 0, explain: 'Beim Eigentumsvorbehalt bleibt der Verkäufer Eigentümer bis zur vollständigen Bezahlung. Der Käufer ist nur Besitzer. Bei Zahlungsverzug kann der Verkäufer die Ware zurückfordern.' },
    { q: 'Was sind Pflichten des Verkäufers beim Kaufvertrag?', opts: ['Eigentum auf den Käufer übertragen und mangelfrei und rechtzeitig liefern', 'Den vereinbarten Preis termingerecht bezahlen', 'Den Kaufvertrag schriftlich niederschreiben', 'Verpackung und Transport bezahlen'], a: 0, explain: 'Die Hauptpflichten des Verkäufers (§433 BGB): 1) Die Sache mangelfrei an den Käufer übergeben, 2) Das Eigentum übertragen. Der Käufer zahlt den Kaufpreis und nimmt die Sache ab.' },
    { q: 'Wer trägt die Kosten für Verpackung und Versand, wenn beim Kauf nichts vereinbart wurde?', opts: ['Verpackung: Verkäufer / Versand: Käufer', 'Kosten werden geteilt', 'Verpackung und Versand zahlt der Verkäufer', 'Verpackung und Versand zahlt der Käufer'], a: 0, explain: 'Ohne besondere Vereinbarung: Verpackungskosten trägt der Verkäufer (§448 BGB), Versandkosten trägt der Käufer. Bei „frei Haus“ übernimmt der Verkäufer beides.' },
    { q: 'Was bedeutet Lieferung „frei Haus“?', opts: ['Verkäufer übernimmt Transport und alle Kosten dafür', 'Verkäufer übernimmt Transport, Käufer zahlt', 'Verkäufer sorgt nur dafür dass Zugang frei ist', 'Käufer holt ab, Transportkosten zahlt Verkäufer'], a: 0, explain: '„Frei Haus“ (Lieferbedingung) bedeutet: Der Verkäufer liefert die Ware zum Empfänger und trägt alle damit verbundenen Transport- und Verpackungskosten.' },
  ],
  verbraucherschutz: [
    { q: 'Welche Aussagen zum Verbraucherschutz sind richtig?', opts: ['Ziel ist Verbraucher zu informieren/beraten + Rechtsberatung durch Verbraucherzentralen ist kostenfrei', 'Verbraucherzentralen nehmen Einfluss auf Gesetzgebung', 'Verbraucherschutz überwacht Mindestlöhne', 'Verbraucherzentralen ziehen schlechte Waren aus dem Verkehr'], a: 0, explain: 'Verbraucherzentralen informieren, beraten und leisten rechtlichen Beistand für Verbraucher — in der Regel kostenlos oder kostengünstig. Sie überwachen keine Löhne.' },
    { q: 'Was sind Aufgaben der Verbraucherzentralen?', opts: ['Verbraucher über Waren/DL informieren + Rechtsverstöße durch Abmahnungen verfolgen', 'Preisobergrenzen für Lebensmittel festlegen', 'Schlechte Waren aus dem Verkehr ziehen', 'Kontrolle der Lebensmittelproduktion'], a: 0, explain: 'Verbraucherzentralen: Informieren über Waren/DL, beraten zu Vertragsrecht, verfolgen Rechtsverstöße durch Abmahnungen und Klagen. Preisobergrenzen und Rückrufe sind staatliche Aufgaben.' },
    { q: 'Eine fehlerhafte elektrische Zahnbürste wird geliefert. Wie nennt man das?', opts: ['Schlechtleistung', 'Lieferverzug', 'Annahmeverzug', 'Nachlieferung'], a: 0, explain: 'Schlechtleistung liegt vor, wenn eine Leistung erbracht wird, die nicht der vereinbarten Qualität entspricht — z.B. fehlerhafte Ware. Lieferverzug = zu spät, Annahmeverzug = Käufer nimmt nicht an.' },
    { q: 'Wie lange hat man Zeit, einen Kauf im Internet zu widerrufen?', opts: ['14 Tage', '7 Tage', '21 Tage', '1 Monat'], a: 0, explain: 'Bei Fernabsatzverträgen (Internet, Telefon) hat der Verbraucher ein 14-tägiges Widerrufsrecht (§355 BGB). Die Frist beginnt ab Erhalt der Ware oder Vertragsabschluss.' },
    { q: 'Was sind richtige Aussagen zum Abzahlungsgeschäft?', opts: ['2-wöchiges Widerrufsrecht + Schriftform zwischen Unternehmen und Verbraucher vorgeschrieben', '4-wöchiges Widerrufsrecht', 'Widerruf nur aus wichtigem Grund möglich', 'Keine Formvorschriften'], a: 0, explain: 'Bei Abzahlungsgeschäften (Ratenkauf) zwischen Unternehmen und Verbraucher: Schriftform ist Pflicht, 14-tägiges (= 2 Wochen) Widerrufsrecht. Ziel: Schutz vor übereilten Entscheidungen.' },
    { q: 'Was sind AGB (Allgemeine Geschäftsbedingungen)?', opts: ['Vorformulierte Vertragsbedingungen, die eine Partei der anderen bei Vertragsabschluss stellt', 'Gewährleistungsausschluss für alle Verträge', 'Bedingungen die nur für Privatpersonen gelten', 'Gesetzliche Rechte von Verbrauchern werden ausgeschlossen'], a: 0, explain: 'AGB (§305 BGB) sind vorformulierte Vertragsbedingungen, die eine Vertragspartei der anderen stellt. Sie müssen einbezogen werden und dürfen keine unzumutbaren Benachteiligungen enthalten.' },
    { q: 'Welches ist ein Verbrauchsgüterkauf?', opts: ['Ein Verbraucher kauft bei einem Fahrradfachgeschäft ein neues Fahrrad', 'Verbraucher kauft gebrauchtes Fahrrad vom Nachbarn', 'Fahrradfachgeschäft kauft Ersatzteile beim Großhändler', 'Fahrradfachgeschäft nimmt Fahrrad von Privatperson in Zahlung'], a: 0, explain: 'Verbrauchsgüterkauf (§474 BGB) = Kauf einer beweglichen Sache von einem Unternehmer durch einen Verbraucher. Besonderer Schutz: 2 Jahre Gewährleistung, Beweislastumkehr 6 Monate.' },
    { q: 'Wie lang sind die Reklamationsfristen beim Verbrauchsgüterkauf?', opts: ['2 Jahre', '6 Monate', '1 Jahr', '3 Jahre'], a: 0, explain: 'Beim Verbrauchsgüterkauf beträgt die Gewährleistungsfrist 2 Jahre ab Übergabe (§438 BGB). In den ersten 6 Monaten wird vermutet, dass der Mangel schon bei Übergabe vorlag (Beweislastumkehr).' },
    { q: 'Wie lange ist ein telefonisches Angebot gültig?', opts: ['Bis zum Ende des Gesprächs', 'Bis Geschäftsschluss', '7 Tage', '14 Tage'], a: 0, explain: 'Ein mündlich (telefonisch) gemachtes Angebot ist nur während des Gesprächs annehmbar (§147 Abs.1 BGB). Danach erlischt es automatisch.' },
    { q: 'Welches Rechtsgeschäft bedürfen der Schriftform?', opts: ['Ratenkauf und Testament', 'Kaufvertrag und Testament', 'Kaufvertrag und Ratenkauf', 'Taschengeldeschäfte und Testament'], a: 0, explain: 'Ratenkauf (Abzahlungsgeschäft) bedarf der Schriftform zum Schutz des Verbrauchers. Testamente müssen eigenhändig geschrieben und unterschrieben werden (notarielles Testament = besondere Form).' },
    { q: '"Zwei Kaufleute schließen einen Kaufvertrag" — Welche Beispiele sind zweiseitige Handelskaufverträge?', opts: ['Einzelhandelsgeschäft kauft Brobedarf im Großhandel; Unternehmen kauft Drucker im Fachgeschäft', 'Verbraucher kauft Fahrrad im Fachgeschäft', 'Privatperson verkauft Auto an Autohändler', 'Kollege verkauft privates Auto'], a: 0, explain: 'Zweiseitiger Handelskauf = beide Parteien sind Kaufleute. Einzelhandel (Kaufmann) kauft von Großhandel (Kaufmann) = zweiseitig. Verbraucher vs. Händler = einseitiger Handelskauf.' },
  ],
  betrieb: [
    { q: 'Wie wird der Wunsch des Menschen nach Nahrung und Kleidung genannt?', opts: ['Bedürfnis', 'Verbrauchsgut', 'Bedarf', 'Konsum'], a: 0, explain: 'Bedürfnisse sind die Wünsche und Mangelempfindungen des Menschen (z.B. Hunger, Sicherheit). Bedarf = Bedürfnis + Kaufkraft. Bedürfnisse sind der Ausgangspunkt allen Wirtschaftens.' },
    { q: 'Was ist unter "Bedarf" zu verstehen?', opts: ['Das mit Kaufkraft abgedeckte Verlangen nach Gütern zur Befriedigung von Bedürfnissen', 'Das Verlangen ohne Kaufkraft', 'Kulturbedürfnisse der Menschen', 'Entsteht nur bei Luxusgütern'], a: 0, explain: 'Bedarf = Bedürfnis + Kaufkraft. Nur wenn ein Bedürfnis durch Geld gedeckt werden kann, entsteht Bedarf (wirtschaftliche Nachfrage). Ohne Kaufkraft bleibt es ein unbefriedigtes Bedürfnis.' },
    { q: 'Welche der genannten Bedürfnisse sind Kollektivbedürfnisse?', opts: ['Sicherheit und Infrastruktur', 'Durst und Luxusreisen', 'Durst und Sicherheit', 'Infrastruktur und Luxusreisen'], a: 0, explain: 'Kollektivbedürfnisse können nur gemeinschaftlich befriedigt werden (z.B. Sicherheit durch Polizei, Infrastruktur durch Straßen). Individualbedürfnisse (Durst, Luxus) befriedigt jeder selbst.' },
    { q: 'Was ist ein Konsumgut als Verbrauchsgut?', opts: ['Produkte die von Privatpersonen gekauft und nach Verwendung nicht wiederverwendet werden können', 'Produkte die von Unternehmen gekauft werden', 'Produkte die wiederverwendet werden können', 'Produkte die von Unternehmen nicht wiederverwendet werden'], a: 0, explain: 'Konsumgut als Verbrauchsgut: von Privatpersonen gekauft, nach Verbrauch nicht mehr nutzbar (z.B. Lebensmittel). Gebrauchsgüter: mehrfach nutzbar (z.B. Auto). Produktionsgüter: für Unternehmen.' },
    { q: 'Welche Unternehmen werden als Dienstleistungsunternehmen bezeichnet?', opts: ['Steuerberater und Spedition', 'Tischler und Autowerk', 'Nur Steuerberater', 'Nur Spedition'], a: 0, explain: 'Dienstleistungsunternehmen erbringen immaterielle Leistungen (z.B. Beratung, Transport, Versicherung). Tischler und Autowerk sind produzierende Unternehmen (Sachgüter).' },
    { q: 'Welche Merkmale kennzeichnen einen Handwerksbetrieb gegenüber einem Industriebetrieb?', opts: ['Viele Einzelanfertigungen und Nähe zum Kunden', 'Meist Serienfertigung', 'Umstellung der Produktion nur mit viel Aufwand', 'Hohe Automatisierung'], a: 0, explain: 'Handwerksbetriebe: Einzelanfertigung nach Kundenwunsch, persönliche Kundenbeziehung. Industriebetriebe: Serienfertigung, hohe Automatisierung, Massenproduktion.' },
    { q: 'Welche Produktionsformen gehören dem Primärbereich (Urproduktion) an?', opts: ['Landwirtschaft und Bergbau', 'Versicherung und Industriebetrieb', 'Bergbau und Versicherung', 'Landwirtschaft und Industrie'], a: 0, explain: 'Primärsektor (Urproduktion): Landwirtschaft, Forstwirtschaft, Fischerei, Bergbau — gewinnen Rohstoffe direkt aus der Natur. Sekundär: Verarbeitung. Tertiär: Dienstleistungen.' },
    { q: 'Welche der genannten Güter sind Investitionsgüter?', opts: ['LKW, Büromöbel und Drehmaschine', 'Fernsehsessel, LKW und Büromöbel', 'Nur Drehmaschine', 'Fernsehsessel und Drehmaschine'], a: 0, explain: 'Investitionsgüter (Produktionsgüter) werden von Unternehmen zur Herstellung anderer Güter eingesetzt (LKW, Büromöbel, Maschinen). Fernsehsessel = Konsumgut für Privatpersonen.' },
    { q: 'Gleichartige Fertigungsmaschinen und Arbeitsplätze werden zusammengefasst. Welche Fertigungsart ist das?', opts: ['Werkstattfertigung', 'Baustellenfertigung', 'Fließfertigung', 'Reihenfertigung'], a: 0, explain: 'Werkstattfertigung: Maschinen gleicher Art werden in einer Abteilung (Werkstatt) zusammengefasst. Geeignet für Einzelfertigung. Fließfertigung: Maschinen nach Arbeitsfolge angeordnet (z.B. Fließband).' },
    { q: 'Wodurch lässt sich die Produktivität eines Unternehmens steigern?', opts: ['Erhöhung der Produktionsmenge pro Tag', 'Neue Mitarbeiter einstellen', 'Wöchentliche Arbeitszeit reduzieren', 'Sonderzahlungen für Mitarbeiter'], a: 0, explain: 'Produktivität = Ausbringungsmenge / Faktoreinsatz. Sie steigt durch: mehr Output bei gleichem Einsatz (z.B. neue Maschine) oder gleicher Output bei weniger Einsatz (Prozessoptimierung).' },
    { q: 'Bike AG: April 450 Fahrräder, Mai 495 Fahrräder (je 24 Arbeitstage). Um wie viel % stieg die Arbeitsproduktivität?', opts: ['10 %', '110 %', '1 %', '45 %'], a: 0, explain: 'Produktivitätssteigerung = (495-450)/450 × 100 = 45/450 × 100 = 10 %. Die Produktion stieg um 10 % — dank der neuen Maschine.' },
    { q: 'Nach welcher Formel wird die Rentabilität eines Unternehmens berechnet?', opts: ['(Gewinn × 100) / Kapital', '(Gewinn × Kapital) / 100', '(Gewinn × 100) / Fixkosten', '(Kapital × 100) / Gewinn'], a: 0, explain: 'Rentabilität = (Gewinn × 100) / Kapital. Sie zeigt, wie viel Prozent Rendite das eingesetzte Kapital erzielt. Eigenkapitalrentabilität und Gesamtkapitalrentabilität sind häufige Kennzahlen.' },
  ],
  existenzgruendung: [
    { q: 'Was sollte ein zukünftiger Unternehmer im Blick haben?', opts: ['Erfolgsversprechende Geschäftsidee + Einnahmen und Ausgaben planen', 'Geregelte Arbeitszeit', 'Auf Krankenversicherung verzichten', 'Nur auf Eigenkapital setzen'], a: 0, explain: 'Voraussetzungen für eine erfolgreiche Gründung: tragfähige Geschäftsidee, sorgfältige Finanzplanung (Einnahmen/Ausgaben/Kapital), Marktanalyse und ausreichende Absicherung.' },
    { q: 'Welche Vorteile hat eine Finanzierung über Leasing?', opts: ['Liquidität wird geschont + Leasingraten steuerlich als Betriebsausgaben absetzbar', 'Leasingvertrag ist kündbar', 'Risikoprämienzahlungen entfallen', 'Fahrzeug muss nicht gekauft werden, Eigentum geht über'], a: 0, explain: 'Leasingvorteile: 1) Liquiditätsschonung (kein Kaufpreis sofort), 2) Leasingraten als Betriebsausgaben steuerlich absetzbar. Nachteil: in der Regel nicht kündbar, Leasinggesellschaft bleibt Eigentümer.' },
    { q: 'Wie sind die Besitz- und Eigentumsverhältnisse beim Leasing?', opts: ['Leasinggesellschaft = Eigentümer; Leasingnehmer = Besitzer', 'Leasingnehmer wird Eigentümer', 'Bea Bäcker ist Eigentümerin, Comfort Leasing ist Besitzer', 'Comfort Leasing ist Eigentümer und Besitzer'], a: 0, explain: 'Beim Leasing bleibt die Leasinggesellschaft rechtlicher Eigentümer. Der Leasingnehmer hat nur die tatsächliche Sachherrschaft (Besitz) und das Nutzungsrecht.' },
    { q: 'Welche Institutionen beraten bei der Existenzgründung?', opts: ['IHK/HWK und Gewerbeaufsichtsamt', 'Verbraucherschutzorganisationen', 'Nur Kreditinstitute', 'Nur das Finanzamt'], a: 0, explain: 'Bei Existenzgründungen beraten: IHK/HWK (Gründungsberatung, Förderinfo), Gewerbeaufsichtsamt (Gewerbeanmeldung), Kreditinstitute (Finanzierung), BAFA, KfW-Bank.' },
    { q: 'Welche Aussage zur Gesellschaftsform ist richtig, wenn man allein gründen will?', opts: ['Bei einer Einzelunternehmung kann er die Geschäftsführung allein ausüben', 'GmbH-Gründung erfordert einen Partner', 'Bei einer KG kann er als Kommanditist allein führen', 'AG ist für kleine Unternehmen geeignet'], a: 0, explain: 'Das Einzelunternehmen ermöglicht alleinige Führung und Entscheidung. GmbH ist auch mit einer Person möglich (1-Personen-GmbH), aber teurer. KG braucht mind. 2 Gesellschafter.' },
    { q: 'Wie könnte der Firmenname eines ins Handelsregister eingetragenen Einzelkaufmanns lauten?', opts: ['Peter Petersen International', 'Peter Petersen GmbH', 'Peter Petersen e. K.', 'Peter Petersen OHG'], a: 0, explain: 'Ein Einzelkaufmann kann seinen Namen mit einem Fantasiezusatz als Firma führen (z.B. "Peter Petersen International"). GmbH und OHG setzen andere Rechtsformen voraus. e.K. wird als Zusatz angefügt, ist aber kein Firmenname allein.' },
    { q: 'Wie erfahren Unternehmen welche Produkte sich am Markt durchsetzen?', opts: ['Primärforschung (neue Daten erheben) und Sekundärforschung (bestehende Daten auswerten)', 'Nur durch den Marketing-Mix', 'Nur durch Corporate Communications', 'Nur durch Primärforschung'], a: 0, explain: 'Marktforschung: Primärforschung = eigene Erhebung neuer Daten (Umfragen, Tests). Sekundärforschung = Auswertung bereits vorhandener Daten (Statistiken, Studien). Beide liefern Marktinformationen.' },
    { q: 'Was ist ein eingetragener Kaufmann (e. K.)?', opts: ['Inhaber haftet persönlich mit seinem ganzen Vermögen', 'Juristische Person', 'Mindestens 2 Personen notwendig', 'Haftet nur beschränkt mit Firmeneinlage'], a: 0, explain: 'Der eingetragene Kaufmann (e.K.) ist ein Einzelunternehmer, der im Handelsregister eingetragen ist. Er haftet unbeschränkt persönlich mit seinem gesamten Vermögen — kein Haftungsschutz.' },
    { q: 'Was ist eine Potentialanalyse?', opts: ['Strukturierte Untersuchung der Fähigkeiten eines Mitarbeiters', 'Karriereplanung für Führungskräfte', 'Stellenbeschreibung einer Position', 'Familienplanung des Mitarbeiters'], a: 0, explain: 'Die Potentialanalyse ist eine systematische Untersuchung der vorhandenen und entwickelbaren Fähigkeiten (Potentiale) eines Mitarbeiters — z.B. für Beförderungsentscheidungen oder Weiterbildungsplanung.' },
  ],
  soziale_sicherung: [
    { q: 'Was lässt sich aus der Bevölkerungspyramide 1990 vs. 2030 ableiten?', opts: ['Die Lebenserwartung erhöht sich', '1990 wurden weniger Kinder geboren als 2030', 'Die Lebenserwartung sinkt', 'Das Durchschnittsalter sinkt'], a: 0, explain: 'Die Bevölkerungspyramide 2030 zeigt: weniger Kinder (schmalere Basis) und mehr ältere Menschen (breitere Spitze). Die Lebenserwartung steigt. Das Durchschnittsalter der Bevölkerung nimmt zu.' },
    { q: 'Welche Auswirkung hat der demografische Wandel auf die Renten?', opts: ['Immer weniger Erwerbstätige müssen immer mehr Renten finanzieren', 'Renteneintrittsalter wird gesenkt', 'Rentenbeiträge können gesenkt werden', 'Private Altersvorsorge wird nicht notwendig'], a: 0, explain: 'Demografischer Wandel: weniger Beitragszahler, mehr Rentner. Das Umlageverfahren gerät unter Druck — der Generationenvertrag wird schwerer zu finanzieren. Beiträge steigen oder Leistungen sinken.' },
    { q: 'Welche Maßnahme trägt zur Bewältigung des demografischen Wandels bei?', opts: ['Förderung von Familienpolitik und Kinderbetreuung', 'Kürzung der Rentenleistungen', 'Erhöhung von Arbeitslosenversicherungsleistungen', 'Reduzierung der medizinischen Versorgung'], a: 0, explain: 'Maßnahmen gegen demografischen Wandel: Familienpolitik (mehr Kinder), Zuwanderung von Fachkräften, Verlängerung der Lebensarbeitszeit, Stärkung der Kapitaldeckung.' },
    { q: 'Jette Bömer, 19 Jahre, arbeitet 5 Stunden täglich. Wie hoch ist ihr Pausenanspruch nach ArbZG?', opts: ['Kein Pausenanspruch — Anspruch besteht erst ab 6 Stunden', 'Mindestens 30 Minuten', 'Mindestens 45 Minuten', 'Mindestens 15 Minuten'], a: 0, explain: 'Nach ArbZG §4: Pause erst ab 6 Stunden Arbeitszeit (30 Min.), ab 9 Stunden 45 Min. Bei 5 Stunden besteht kein gesetzlicher Pausenanspruch. Das JArbSchG gilt nicht mehr, da sie 19 ist.' },
    { q: 'Keno, 20 Jahre, beginnt um 7.30 Uhr, arbeitet 8 Stunden. Wann muss er spätestens Pause machen?', opts: ['Spätestens um 13.30 Uhr', 'Spätestens um 13.00 Uhr', 'Spätestens um 14.00 Uhr', 'Spätestens um 14.30 Uhr'], a: 0, explain: 'Nach ArbZG §4 müssen Arbeitnehmer nach spätestens 6 Stunden pausieren. 7.30 Uhr + 6 Stunden = 13.30 Uhr. Keno muss spätestens um 13.30 Uhr eine Pause einlegen.' },
    { q: 'Welche Maßnahmen sind im Rahmen von Compliance-Richtlinien geeignet?', opts: ['Vertragsgemäße Bezahlung + vertrauliche Meldung von Missständen ermöglichen', 'Erhöhung von Gehältern der Führungskräfte', 'Streichung der Überstundenvergütung', 'Nur Datenschutzmaßnahmen'], a: 0, explain: 'Compliance = regelkonformes Verhalten. Geeignete Maßnahmen: korrekte Bezahlung, Whistleblowing-Systeme (vertrauliche Meldung von Verstößen), Schulungen, Verhaltenskodex.' },
    { q: 'Was ist der Unterschied zwischen individuellem und kollektivem Arbeitsrecht?', opts: ['Individuell: AG und AN direkt; Kollektiv: durch Gewerkschaft/Betriebsrat für eine Branche', 'Individuell: AG bestimmt nach BR-Verhandlung; Kollektiv: staatlich festgelegt', 'Kein Unterschied', 'Kollektiv gilt nur im öffentlichen Dienst'], a: 0, explain: 'Individuelles Arbeitsrecht: Regelung zwischen einzelnem AG und AN (Arbeitsvertrag). Kollektives Arbeitsrecht: Regelung durch Interessenvertretungen (Gewerkschaft/Arbeitgeberverband → Tarifvertrag; Betriebsrat → Betriebsvereinbarung).' },
    { q: 'Wie werden Vermittlungsbemühungen durch eine unparteiische Person vor einem Streik genannt?', opts: ['Schlichtung', 'Urabstimmung', 'Friedenspflicht', 'Aussperrung'], a: 0, explain: 'Die Schlichtung ist ein Verfahren zur außergerichtlichen Beilegung von Tarifkonflikten durch eine neutrale dritte Person (Schlichter), bevor es zu Arbeitskampfmaßnahmen kommt.' },
    { q: 'Was ist richtig zur Urabstimmung?', opts: ['Wenn mindestens 75% der Gewerkschaftsmitglieder zustimmen, darf die Gewerkschaft streiken', 'Schlichter muss vor Urabstimmung tätig werden', 'Nur Gewerkschaftsmitglieder nehmen teil', 'Ein Streik darf eine bestimmte Dauer nicht überschreiten'], a: 0, explain: 'Bei der Urabstimmung stimmen die Gewerkschaftsmitglieder über einen Streik ab. Meist ist eine Mehrheit von 75% erforderlich. Erst danach darf die Gewerkschaft offiziell zum Streik aufrufen.' },
    { q: 'Welche Aussagen zur Gültigkeit eines Tarifvertrages treffen zu?', opts: ['Tarifvertrag kann vom Ministerium für "Allgemeinverbindlich" erklärt werden — gilt dann für alle AN einer Branche', 'Arbeitnehmer muss Gewerkschaftsmitglied sein', 'Tarifverträge können mündlich abgeschlossen werden', 'Tarifvertrag nur zwischen einzelnem AG und Betriebsrat'], a: 0, explain: 'Tarifverträge gelten direkt nur für Mitglieder der Tarifvertragsparteien. Das Arbeitsministerium kann einen TV für "allgemeinverbindlich" erklären — dann gilt er für alle AN der Branche, unabhängig von der Mitgliedschaft.' },
    { q: 'Was ist das Ziel des Europass?', opts: ['Lernen und Arbeiten innerhalb der EU vereinfachen und fördern', 'Berufliche Abschlüsse innerhalb der EU vergleichbar machen', 'Grenzübertritt vereinfachen', 'Sicherheit an Außengrenzen der EU gewährleisten'], a: 0, explain: 'Der Europass ist ein Portfolio von Dokumenten (CV, Sprachpass, Mobilitätsnachweis), das die Transparenz von Qualifikationen erhöht und Lernen sowie Arbeiten in Europa erleichtern soll.' },
    { q: 'Was ist Nachhaltigkeit?', opts: ['Handlungsprinzip zur Ressourcennutzung, das natürliche Regenerationsfähigkeiten erhält', 'Einsatz moderner Managementmethoden zur Umsatzsteigerung', 'Nutzung möglichst günstiger Grundstoffe', 'Kurzfristige Gewinnmaximierung'], a: 0, explain: 'Nachhaltigkeit bedeutet, Ressourcen so zu nutzen, dass die Bedürfnisse der heutigen Generation befriedigt werden, ohne die Möglichkeiten zukünftiger Generationen zu gefährden (3 Säulen: Ökologie, Ökonomie, Soziales).' },
    { q: 'In welcher Zeile sind nur erneuerbare Energien genannt?', opts: ['Windenergie, Erdwärme, Wasserkraft', 'Sonnenenergie, Steinkohle, Erdwärme', 'Biomasse, Erdwärme, Erdgas', 'Erdöl, Wasserkraft, Uran'], a: 0, explain: 'Erneuerbare Energien: Windkraft, Sonnenenergie, Wasserkraft, Erdwärme (Geothermie), Biomasse. Steinkohle, Erdgas, Erdöl und Uran sind fossile/nukleäre (nicht erneuerbare) Energieträger.' },
  ],
  gerichtsbarkeit: [
